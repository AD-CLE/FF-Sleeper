<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - Fantasy Football Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header-section {
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .main-content {
            max-width: 80rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .search-form {
            margin-bottom: 3rem;
            display: flex;
            gap: 0.75rem;
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .year-select, .search-button {
            padding: 0.75rem 1.5rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .search-button {
            background: #fbbf24;
            color: #1e293b;
            font-weight: 600;
            border: none;
        }

        .search-button:hover:not(:disabled) {
            background: #f59e0b;
        }

        .search-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-container {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .error-container {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(127, 29, 29, 0.3);
            border: 1px solid #7f1d1d;
            border-radius: 0.5rem;
            color: #fecaca;
        }

        .user-card {
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: linear-gradient(to right, #1e293b, rgba(30, 41, 59, 0.5));
            border: 1px solid #475569;
            border-radius: 0.75rem;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .user-meta {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .leagues-section {
            margin-bottom: 3rem;
        }

        .leagues-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
        }

        .league-card {
            border: 1px solid #475569;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .league-header {
            width: 100%;
            padding: 1.5rem;
            background: #1e293b;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            transition: all 0.2s;
        }
        
        .league-header > div:first-child {
            flex: 1;
            text-align: left;
        }

        .league-header:hover {
            background: #0f172a;
        }

        .league-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: white;
        }

        .league-meta {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .league-chevron {
            font-size: 1.5rem;
            color: #fbbf24;
            transition: transform 0.2s;
        }

        .league-card.expanded .league-chevron {
            transform: rotate(180deg);
        }

        .rosters-container {
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid #475569;
            padding: 1.5rem;
        }

        .rosters-container.hidden {
            display: none;
        }

        .roster-info {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #475569;
        }

        .roster-info-title {
            color: #fbbf24;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .roster-info-text {
            color: #cbd5e1;
            font-size: 0.85rem;
        }

        .position-group {
            margin-bottom: 1.5rem;
        }

        .position-header {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid #475569;
            padding-bottom: 0.5rem;
        }

        .player-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(30, 41, 59, 0.7);
            border-left: 3px solid #fbbf24;
            border-radius: 0.375rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .player-meta {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .player-ranks {
            text-align: right;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .player-ovr {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .player-pos {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 1.5rem 1rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-button, .year-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header-content">
            <div class="header-left">
                <h1>🏆 Sleeper Manager</h1>
                <p class="header-subtitle">Fantasy league roster allocation & analysis</p>
            </div>
            <span style="font-size: 0.85rem; color: #94a3b8;">v1.5-beta</span>
        </div>
    </div>

    <div class="main-content">
        <form class="search-form" id="searchForm">
            <div class="search-container">
                <input 
                    type="text" 
                    id="username" 
                    class="search-input" 
                    placeholder="Enter your Sleeper username..."
                    value="ankurdeora"
                >
            </div>
            <select id="year" class="year-select">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button type="submit" class="search-button" id="searchBtn">Search</button>
        </form>

        <div id="content"></div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const searchForm = document.getElementById('searchForm');
        const usernameInput = document.getElementById('username');
        const yearSelect = document.getElementById('year');
        const searchBtn = document.getElementById('searchBtn');

        let playerLookupCache = {};
        let positionStarters = {};

        async function loadPlayerLookup() {
            try {
                const sheetId = '1V0Y_Bl7kSy--vABftJUOlXnWflPCi5P_Km6LG9VhEsQ';
                const gid = '2112770654';
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
                
                const response = await fetch(url);
                const csv = await response.text();
                const lines = csv.split('\n');
                const headers = lines[0].split(',');
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const values = lines[i].split(',');
                    const row = {};
                    headers.forEach((h, idx) => {
                        row[h.trim()] = values[idx]?.trim() || '';
                    });
                    
                    const sleeperId = String(row['SLEEPER_ID']);
                    playerLookupCache[sleeperId] = {
                        playerName: row['PLAYER_NAME'],
                        position: row['POSITION'],
                        age: parseInt(row['AGE']) || 0,
                        team: row['TEAM'],
                        depthChartPos: row['DEPTH_CHART_POS'],
                        depthChartOrder: parseInt(row['DEPTH_CHART_ORDER']) || 0,
                        yearsExp: parseInt(row['YEARS_EXP']) || 0,
                        posRank: row['POS_RANK'],
                        defaultRank: parseInt(row['Default_Rank']) || 9999
                    };
                }
            } catch (e) {
                console.log('Could not load Player_Lookup:', e);
            }
        }

        function getPlayerData(sleeperId) {
            return playerLookupCache[String(sleeperId)] || null;
        }

        function getStatusIcon(status) {
            if (status.includes('Star')) return '⭐';
            if (status.includes('Starter') || status.includes('FLEX')) return '🎯';
            if (status === 'Bench') return '🪑';
            if (status === 'Trade') return '🔀';
            if (status === 'Cut') return '🗑️';
            return '';
        }

        function allocateRoster(userRoster, league, tepTier) {
            if (!userRoster.players || userRoster.players.length === 0) return {};

            const rosterSlots = {};
            league.roster_positions?.forEach(pos => {
                rosterSlots[pos] = (rosterSlots[pos] || 0) + 1;
            });

            positionStarters = {
                'QB': (rosterSlots['QB'] || 0) + (rosterSlots['SUPER_FLEX'] || 0),
                'RB': rosterSlots['RB'] || 0,
                'WR': rosterSlots['WR'] || 0,
                'TE': rosterSlots['TE'] || 0,
                'K': rosterSlots['K'] || 0,
                'DEF': rosterSlots['DEF'] || 0,
                'FLEX': rosterSlots['FLEX'] || 0,
                'SUPER_FLEX': rosterSlots['SUPER_FLEX'] || 0
            };

            const allocation = {};
            const classified = {'KEEP': [], 'Trade': [], 'Cut': []};

            userRoster.players.forEach(playerId => {
                const playerObj = getPlayerData(playerId);
                if (!playerObj) return;

                const position = playerObj.position;
                const defaultRank = playerObj.defaultRank;
                const posRank = playerObj.posRank || '';
                const yearsExp = playerObj.yearsExp;
                const depthChartOrder = playerObj.depthChartOrder;
                const posRankNum = posRank ? parseInt(posRank.split('_')[1]) : 9999;

                let classification = 'Trade';

                if (position === 'QB') {
                    if (positionStarters['QB'] === 1) {
                        const qbCount = userRoster.players.filter(id => getPlayerData(id)?.position === 'QB').length;
                        classification = qbCount >= 4 ? 'Cut' : 'KEEP';
                    } else {
                        if (depthChartOrder === 1) classification = 'KEEP';
                        else if (depthChartOrder === 2) classification = 'Trade';
                        else if (depthChartOrder >= 3) classification = yearsExp < 4 ? 'Trade' : 'Cut';
                        else classification = yearsExp === 0 ? 'Trade' : 'Cut';
                    }
                } else if (position === 'WR') {
                    classification = (defaultRank > 120 && yearsExp > 4 && depthChartOrder > 3) ? 'Cut' : 'KEEP';
                } else if (position === 'K' || position === 'DEF') {
                    if (depthChartOrder === 1) {
                        classification = 'KEEP'; // Always keep starter
                    } else {
                        // Backup/extra: top 6 pos rank = bench, else cut
                        classification = posRankNum <= 6 ? 'Bench' : 'Cut';
                    }
                } else if (position === 'RB' || position === 'TE') {
                    if (depthChartOrder === 1) classification = 'KEEP';
                    else if (depthChartOrder === 2) classification = yearsExp < 4 ? 'KEEP' : 'Trade';
                    else if (depthChartOrder >= 3) {
                        if (yearsExp < 2) classification = 'KEEP';
                        else if (defaultRank <= 300) classification = 'Trade';
                        else classification = 'Cut';
                    } else classification = yearsExp === 0 ? 'Trade' : 'Cut';
                }

                if (position === 'TE' && tepTier === 'Off') {
                    classification = posRankNum <= 2 ? 'KEEP' : (defaultRank <= 200 || yearsExp === 0 ? 'Trade' : 'Cut');
                }

                allocation[playerId] = {position, classification, defaultRank, posRank, yearsExp, depthChartOrder, finalStatus: null};
                classified[classification].push(playerId);
            });

            Object.keys(classified).forEach(classif => {
                classified[classif].sort((a, b) => (getPlayerData(a)?.defaultRank || 9999) - (getPlayerData(b)?.defaultRank || 9999));
            });

            const assigned = new Set();

            const positions = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'];
            positions.forEach(pos => {
                const slots = positionStarters[pos] || 0;
                for (let i = 0; i < slots; i++) {
                    let player = null;
                    const keepIdx = classified['KEEP'].findIndex(id => getPlayerData(id)?.position === pos);
                    const tradeIdx = classified['Trade'].findIndex(id => getPlayerData(id)?.position === pos);
                    
                    if (keepIdx >= 0) {
                        player = classified['KEEP'].splice(keepIdx, 1)[0];
                    } else if (tradeIdx >= 0) {
                        player = classified['Trade'].splice(tradeIdx, 1)[0];
                    }
                    
                    if (player) {
                        allocation[player].finalStatus = 'Starter';
                        assigned.add(player);
                    }
                }
            });

            const flexSlots = positionStarters['FLEX'] || 0;
            for (let i = 0; i < flexSlots; i++) {
                let bestPlayer = null;
                let bestRank = 9999;
                
                [...classified['KEEP'], ...classified['Trade']].forEach(playerId => {
                    const playerObj = getPlayerData(playerId);
                    if (['RB', 'WR', 'TE'].includes(playerObj?.position)) {
                        const rank = playerObj?.defaultRank || 9999;
                        if (rank < bestRank) {
                            bestPlayer = playerId;
                            bestRank = rank;
                        }
                    }
                });

                if (bestPlayer) {
                    allocation[bestPlayer].finalStatus = 'FLEX';
                    assigned.add(bestPlayer);
                    classified['KEEP'].splice(classified['KEEP'].indexOf(bestPlayer), 1);
                    classified['Trade'].splice(classified['Trade'].indexOf(bestPlayer), 1);
                }
            }

            const benchMin = {'QB': 1, 'RB': 2, 'WR': 2, 'TE': 1, 'K': 0, 'DEF': 0};
            positions.forEach(pos => {
                const needed = benchMin[pos] || 0;
                for (let i = 0; i < needed; i++) {
                    let player = null;
                    const keepIdx = classified['KEEP'].findIndex(id => getPlayerData(id)?.position === pos);
                    const tradeIdx = classified['Trade'].findIndex(id => getPlayerData(id)?.position === pos);
                    
                    if (keepIdx >= 0) {
                        player = classified['KEEP'].splice(keepIdx, 1)[0];
                    } else if (tradeIdx >= 0) {
                        player = classified['Trade'].splice(tradeIdx, 1)[0];
                    }
                    
                    if (player) {
                        allocation[player].finalStatus = 'Bench';
                        assigned.add(player);
                    }
                }
            });

            const bnSlots = rosterSlots['BN'] || 12;
            const benchUsed = Array.from(assigned).filter(pid => ['Bench', 'FLEX'].includes(allocation[pid].finalStatus)).length;
            const remainingBench = bnSlots - benchUsed;

            for (let i = 0; i < remainingBench; i++) {
                let player = classified['KEEP'].shift() || classified['Trade'].shift();
                if (player) {
                    allocation[player].finalStatus = 'Bench';
                    assigned.add(player);
                }
            }

            Object.keys(allocation).forEach(playerId => {
                if (!assigned.has(playerId)) {
                    const record = allocation[playerId];
                    record.finalStatus = record.classification === 'Cut' ? 'Cut' : 'Trade';
                }
            });

            Object.keys(allocation).forEach(playerId => {
                const record = allocation[playerId];
                const posRankNum = record.posRank ? parseInt(record.posRank.split('_')[1]) : 9999;
                let isStars = false;

                if (record.position === 'QB') {
                    isStars = positionStarters['QB'] === 1 ? posRankNum <= 6 : posRankNum <= 12;
                } else if (record.position === 'RB' || record.position === 'WR') {
                    isStars = posRankNum <= 12;
                } else if (record.position === 'TE') {
                    isStars = tepTier === 'Off' ? posRankNum <= 6 : posRankNum <= 12;
                }

                // Only add star if meets position-rank cutoff (don't add to all starters)
                if (isStars && (record.finalStatus === 'Starter' || record.finalStatus === 'FLEX')) {
                    record.finalStatus = '⭐ ' + record.finalStatus;
                }
            });

            return allocation;
        }

        async function fetchSleeperData(username, year) {
            try {
                searchBtn.disabled = true;
                searchBtn.textContent = 'Loading...';
                contentDiv.innerHTML = '<div class="loading-container">⏳ Fetching your data...</div>';

                await loadPlayerLookup();

                const userRes = await fetch(`https://api.sleeper.app/v1/user/${username}`);
                if (!userRes.ok) throw new Error('Username not found');
                const user = await userRes.json();

                const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year}`);
                if (!leaguesRes.ok) throw new Error('Could not fetch leagues');
                const leagues = await leaguesRes.json();

                const leaguesWithRosters = await Promise.all(
                    leagues.map(async (league) => {
                        try {
                            const rostersRes = await fetch(`https://api.sleeper.app/v1/league/${league.league_id}/rosters`);
                            const rosters = await rostersRes.json();
                            return {...league, rosters: rosters.sort((a, b) => (b.wins || 0) - (a.wins || 0))};
                        } catch {
                            return {...league, rosters: []};
                        }
                    })
                );

                renderUI(user, leaguesWithRosters);
            } catch (err) {
                contentDiv.innerHTML = `<div class="error-container">⚠️ Error: ${err.message}</div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
            }
        }

        function renderUI(user, leagues) {
            let html = `<div class="user-card"><div><h2 class="user-name">${user.display_name}</h2><p class="user-meta">@${user.username} • ${leagues.length} league${leagues.length !== 1 ? 's' : ''}</p></div></div>`;
            html += '<div class="leagues-section"><h3 class="leagues-title">🏆 Your Leagues</h3>';

            leagues.forEach((league, leagueIdx) => {
                const userRoster = league.rosters?.find(r => r.owner_id === user.user_id);
                const scoringSettings = league.scoring_settings || {};
                const bonusRecTe = parseFloat(scoringSettings.bonus_rec_te) || 0;
                let tepTier = bonusRecTe === 0 ? 'Off' : (bonusRecTe <= 1 ? 'TEP' : 'TEP+');

                const scoringParts = [];
                if (league.roster_positions?.includes('SUPER_FLEX')) scoringParts.push('SF');
                const recValue = scoringSettings.rec;
                if (recValue === 1) scoringParts.push('PPR');
                else if (recValue === 0.5) scoringParts.push('HPPR');
                else if (recValue === 0) scoringParts.push('STD');
                else scoringParts.push('PPR');
                if (bonusRecTe > 0) scoringParts.push(`${recValue + bonusRecTe}TEP`);
                if (league.settings?.best_ball === 1) scoringParts.push('Best Ball');

                html += `<div class="league-card"><button class="league-header" onclick="toggleLeague(${leagueIdx})"><div><div class="league-name">${league.name}</div><div class="league-meta">${league.total_rosters} teams • Season ${league.season}</div><div class="league-meta" style="color: #fbbf24; margin-top: 0.5rem;">Scoring: ${scoringParts.join(' ')}</div></div><span class="league-chevron">▼</span></button>`;
                html += `<div class="rosters-container hidden" id="rosters-${leagueIdx}">`;

                if (userRoster) {
                    const allocation = allocateRoster(userRoster, league, tepTier);
                    
                    // Build roster requirements summary
                    const rosterReqs = {};
                    league.roster_positions?.forEach(pos => {
                        rosterReqs[pos] = (rosterReqs[pos] || 0) + 1;
                    });
                    const posOrder = ['QB', 'RB', 'WR', 'TE', 'FLEX', 'SUPER_FLEX', 'K', 'DEF', 'IR', 'TAXI', 'BN'];
                    const reqSummary = posOrder.filter(pos => rosterReqs[pos]).map(pos => `${rosterReqs[pos]} ${pos === 'SUPER_FLEX' ? 'SF' : pos}`).join(', ');
                    
                    html += '<div class="roster-info"><div class="roster-info-title">Roster Requirements (' + league.roster_positions.length + ' players)</div>';
                    html += `<div class="roster-info-text">${reqSummary}</div>`;
                    html += '</div>';
                    
                    html += '<div class="roster-info"><div class="roster-info-title">Your Roster Summary</div>';
                    html += `<div class="roster-info-text">Total Players: ${userRoster.players.length}</div>`;
                    html += '</div>';
                    
                    html += '<div class="roster-info"><div class="roster-info-title">Status Legend</div>';
                    html += '<div class="roster-info-text">⭐ Star • 🎯 Starter/FLEX • 🪑 Bench • 🔀 Trade • 🗑️ Cut | 💔 IR • 🚕 Taxi</div>';
                    html += '</div>';

                    const playersByPosition = {};
                    userRoster.players.forEach(playerId => {
                        const playerObj = getPlayerData(playerId);
                        const position = playerObj?.position || 'N/A';
                        if (!playersByPosition[position]) playersByPosition[position] = [];
                        playersByPosition[position].push(playerId);
                    });

                    const positionOrder = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'];
                    const sortedPositions = positionOrder.filter(pos => playersByPosition[pos]);

                    sortedPositions.forEach(position => {
                        html += `<div class="position-group"><div class="position-header">━━ ${position} ━━</div>`;

                        playersByPosition[position].sort((a, b) => {
                            const rankA = getPlayerData(a)?.defaultRank || 9999;
                            const rankB = getPlayerData(b)?.defaultRank || 9999;
                            return rankA - rankB;
                        }).forEach(playerId => {
                            const playerObj = getPlayerData(playerId);
                            const alloc = allocation[playerId];
                            const name = playerObj?.playerName || 'Unknown';
                            const team = playerObj?.team || 'N/A';
                            const ovrRank = playerObj?.defaultRank < 9999 ? playerObj.defaultRank : 'Unranked';
                            const posRank = playerObj?.posRank || '';
                            const posNum = posRank ? posRank.split('_')[1] : '';
                            const status = alloc?.finalStatus || 'Unknown';

                            // Get icon and clean status text
                            const statusIcon = getStatusIcon(status);
                            const statusText = status.replace('⭐ ', '').replace(' Starter', '').replace(' FLEX', '');

                            // Check if player is on IR or Taxi
                            const isOnIR = userRoster.reserve && userRoster.reserve.includes(playerId);
                            const isOnTaxi = userRoster.taxi && userRoster.taxi.includes(playerId);
                            const slotFlag = isOnIR ? ' 💔' : (isOnTaxi ? ' 🚕' : '');

                            const statusColor = (status.includes('Starter') || status.includes('FLEX')) ? '#34d399' : (status === 'Bench' ? '#cbd5e1' : (status === 'Trade' ? '#f97316' : '#ef4444'));

                            html += `<div class="player-item"><div class="player-info"><div class="player-name">${statusIcon}${slotFlag} ${status} ${name} (${team})</div><div class="player-meta">Age: ${playerObj?.age || 'N/A'} (Exp: ${playerObj?.yearsExp || 'N/A'}) | Depth #${playerObj?.depthChartOrder || 'N/A'} (${playerObj?.depthChartPos || 'N/A'})</div></div><div class="player-ranks"><div class="player-ovr" style="color: ${statusColor};">OVR #${ovrRank}</div>${posNum ? `<div class="player-pos">${position} #${posNum}</div>` : ''}</div></div>`;
                        });

                        html += '</div>';
                    });
                } else {
                    html += '<p style="color: #94a3b8;">You are not in this league</p>';
                }

                html += '</div></div>';
            });

            html += '</div>';
            contentDiv.innerHTML = html;
        }

        function toggleLeague(idx) {
            const rosters = document.getElementById(`rosters-${idx}`);
            rosters.classList.toggle('hidden');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            if (username) fetchSleeperData(username, yearSelect.value);
        });

        window.addEventListener('load', () => {
            fetchSleeperData(usernameInput.value, yearSelect.value);
        });
    </script>
</body>
</html>
