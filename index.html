<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - My Rosters</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ── */
        .nav {
            background: rgba(10, 16, 30, 0.95);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 0;
            height: 56px;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbf24;
            text-decoration: none;
            letter-spacing: -0.02em;
            margin-right: 2rem;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex: 1;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            min-height: 44px;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.06);
        }

        .nav-link.active {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .nav-link .nav-icon { font-size: 0.95rem; }

        .nav-version {
            font-size: 0.7rem;
            color: #475569;
            font-family: monospace;
            margin-left: auto;
        }

        /* ── HEADER ── */
        .header-section {
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(15, 23, 42, 0.6);
            padding: 2rem 1.5rem;
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
        }

        .header-content h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.35rem;
        }

        .header-subtitle {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* ── MAIN ── */
        .main-content {
            max-width: 80rem;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        .search-form {
            margin-bottom: 2.5rem;
            display: flex;
            gap: 0.75rem;
        }

        .search-container { position: relative; flex: 1; }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .search-input::placeholder { color: #475569; }

        .year-select {
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .search-button {
            padding: 0.75rem 1.5rem;
            background: #fbbf24;
            color: #0f172a;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-button:hover:not(:disabled) { background: #f59e0b; }
        .search-button:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading-container {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .error-container {
            margin-bottom: 2rem;
            padding: 1rem 1.25rem;
            background: rgba(127, 29, 29, 0.25);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            color: #fca5a5;
            font-size: 0.9rem;
        }

        .user-card {
            margin-bottom: 2.5rem;
            padding: 1.25rem 1.5rem;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: 2px solid #fbbf24;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-avatar-placeholder {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: 2px solid #fbbf24;
            background: rgba(251,191,36,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .user-name { font-size: 1.35rem; font-weight: 700; color: white; margin: 0; }
        .user-meta { color: #64748b; font-size: 0.825rem; margin-top: 0.2rem; }

        .leagues-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend {
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: rgba(15,23,42,0.5);
            border: 1px solid #1e293b;
            border-radius: 0.5rem;
            color: #94a3b8;
            font-size: 0.82rem;
        }

        .league-card {
            border: 1px solid #334155;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .league-header {
            width: 100%;
            padding: 1.25rem 1.5rem;
            background: #1e293b;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            transition: background 0.15s;
        }

        .league-header > div:first-child { flex: 1; text-align: left; }
        .league-header:hover { background: #162032; }

        .league-name { font-size: 1rem; font-weight: 700; color: white; }
        .league-meta { font-size: 0.825rem; color: #64748b; margin-top: 0.2rem; user-select: text; -webkit-user-select: text; }
        .league-scoring { font-size: 0.825rem; color: #fbbf24; margin-top: 0.35rem; }

        .league-chevron {
            font-size: 1.1rem;
            color: #fbbf24;
            transition: transform 0.2s;
            margin-top: 0.2rem;
            flex-shrink: 0;
        }

        .league-card.expanded .league-chevron { transform: rotate(180deg); }

        .rosters-container {
            background: rgba(10, 16, 30, 0.5);
            border-top: 1px solid #1e293b;
            padding: 1.5rem;
        }

        .rosters-container.hidden { display: none; }

        .roster-info {
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e293b;
        }

        .roster-info-title { color: #fbbf24; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.35rem; }
        .roster-info-text { color: #94a3b8; font-size: 0.82rem; }

        .position-group { margin-bottom: 1.25rem; }

        .position-header {
            color: #475569;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid #1e293b;
        }

        .player-item {
            padding: 0.75rem 0.875rem;
            margin-bottom: 0.375rem;
            background: rgba(30, 41, 59, 0.6);
            border-left: 3px solid #334155;
            border-radius: 0.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .player-info { flex: 1; }
        .player-name { color: white; font-weight: 600; font-size: 1rem; }
        .player-meta { color: #475569; font-size: 0.875rem; margin-top: 0.25rem; }

        .player-ranks { text-align: right; flex-shrink: 0; }
        .player-ovr { font-weight: 600; font-size: 1rem; }
        .player-pos { color: #475569; font-size: 0.875rem; margin-top: 0.2rem; }

        @media (max-width: 640px) {
            .nav-inner { padding: 0 1rem; height: 52px; }
            .nav-brand { font-size: 0.95rem; margin-right: 1rem; }
            .nav-links { gap: 0; }
            .nav-link { padding: 0.5rem 0.75rem; font-size: 0.8rem; }
            .nav-version { display: none; }
            
            .header-section { padding: 1.5rem 1rem; }
            .header-content h1 { font-size: 1.35rem; }
            
            .main-content { padding: 1.5rem 1rem; }
            .search-form { flex-direction: column; gap: 0.75rem; }
            .search-input, .search-button, .year-select { width: 100%; padding: 0.75rem; font-size: 1rem; }
            
            .league-card { padding: 1.25rem 1rem; }
            .league-header { flex-direction: column; gap: 0.75rem; }
            .league-header > div:first-child { text-align: left; }
            .league-header > div:last-child { width: 100%; text-align: left; }
            
            .player-item { flex-direction: column; gap: 0.5rem; padding: 0.75rem 0.75rem; }
            .player-ranks { width: 100%; text-align: left; }
            .player-meta { font-size: 0.8rem; }
            
            .draft-picks { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
            .draft-pick { padding: 0.6rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- ── GLOBAL NAV ── -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">🏆 Sleeper Manager</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">
                    <span class="nav-icon">👤</span> My Rosters
                </a>
                <a href="league.html" class="nav-link">
                    <span class="nav-icon">🏟️</span> League View
                </a>
                <a href="profile.html" class="nav-link">
                    <span class="nav-icon">🔍</span> Manager Profiles
                </a>
            </div>
            <span class="nav-version">v1.9.22-beta</span>
        </div>
    </nav>

    <div class="header-section">
        <div class="header-content">
            <h1>My Rosters</h1>
            <p class="header-subtitle">Your leagues, roster allocation &amp; player grading</p>
        </div>
    </div>

    <div class="main-content">
        <form class="search-form" id="searchForm">
            <div class="search-container">
                <input type="text" id="username" class="search-input" placeholder="Enter your Sleeper username..." value="ankurdeora">
            </div>
            <select id="year" class="year-select">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button type="submit" class="search-button" id="searchBtn">Search</button>
        </form>

        <div id="content"></div>
    </div>

    <script src="utils.js"></script>
    <script>
        const contentDiv = document.getElementById('content');
        const searchForm = document.getElementById('searchForm');
        const usernameInput = document.getElementById('username');
        const yearSelect = document.getElementById('year');
        const searchBtn = document.getElementById('searchBtn');

        async function fetchSleeperData(username, year) {
            try {
                searchBtn.disabled = true;
                searchBtn.textContent = 'Loading...';
                contentDiv.innerHTML = '<div class="loading-container">⏳ Fetching your data...</div>';
                await loadPlayerLookup();
                const userRes = await fetch(`https://api.sleeper.app/v1/user/${username}`);
                if (!userRes.ok) throw new Error('Username not found');
                const user = await userRes.json();
                const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year}`);
                if (!leaguesRes.ok) throw new Error('Could not fetch leagues');
                const leagues = await leaguesRes.json();
                const leaguesWithRosters = await Promise.all(leagues.map(async (league) => {
                    try {
                        const [rostersRes, tradedPicksRes, usersRes] = await Promise.all([
                            fetch(`https://api.sleeper.app/v1/league/${league.league_id}/rosters`),
                            fetch(`https://api.sleeper.app/v1/league/${league.league_id}/traded_picks`),
                            fetch(`https://api.sleeper.app/v1/league/${league.league_id}/users`)
                        ]);
                        const rosters = await rostersRes.json();
                        const tradedPicks = await tradedPicksRes.json();
                        const users = await usersRes.json();
                        const userMap = {};
                        users.forEach(u => { userMap[u.user_id] = u; });
                        const rosterMap = {};
                        rosters.forEach(r => { rosterMap[r.roster_id] = r; });
                        return {...league, rosters: rosters.sort((a, b) => (b.wins || 0) - (a.wins || 0)), tradedPicks, userMap, rosterMap};
                    } catch (e) {
                        console.error('Failed to load league data:', e);
                        return {...league, rosters: [], tradedPicks: [], userMap: {}, rosterMap: {}};
                    }
                }));
                renderUI(user, leaguesWithRosters);
            } catch (err) {
                console.error('fetchSleeperData error:', err);
                contentDiv.innerHTML = `<div class="error-container">⚠️ ${err.message}</div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
            }
        }

        function renderUI(user, leagues) {
            localStorage.setItem('sleeperUsername', user.username);
            localStorage.setItem('sleeperUserId', user.user_id);

            let html = `<div class="user-card">`;
            if (user.avatar) {
                html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" alt="${user.username}" class="user-avatar" />`;
            } else {
                html += `<div class="user-avatar-placeholder">👤</div>`;
            }
            html += `<div><h2 class="user-name">${user.display_name}</h2><p class="user-meta">@${user.username} • ID: ${user.user_id}</p><p class="user-meta">${leagues.length} league${leagues.length !== 1 ? 's' : ''} in ${yearSelect.value}</p><p class="user-meta" style="margin-top:0.4rem;"><a href="profile.html?user=${user.username}" style="color:#fbbf24;text-decoration:none;font-size:0.8rem;">View My Profile →</a></p></div></div>`;

            html += `<div class="leagues-section">`;
            html += `<h3 class="leagues-title">🏆 Your Leagues <span style="font-size:0.85rem;font-weight:400;color:#475569;">(${leagues.length})</span></h3>`;
            html += `<div class="legend">⭐ Star &nbsp;|&nbsp; 🎯 Starter / FLEX &nbsp;|&nbsp; 🪑 Bench &nbsp;|&nbsp; 🔀 Trade &nbsp;|&nbsp; 🗑️ Cut &nbsp;|&nbsp; 💔 IR &nbsp;|&nbsp; 🚕 Taxi</div>`;

            leagues.forEach((league, leagueIdx) => {
                const userRoster = league.rosters?.find(r => r.owner_id === user.user_id);
                const scoringSettings = league.scoring_settings || {};
                const bonusRecTe = parseFloat(scoringSettings.bonus_rec_te) || 0;
                const tepTier = bonusRecTe === 0 ? 'Off' : (bonusRecTe <= 1 ? 'TEP' : 'TEP+');
                const scoringParts = [];
                if (league.roster_positions?.includes('SUPER_FLEX')) scoringParts.push('SF');
                const recValue = scoringSettings.rec;
                if (recValue === 1) scoringParts.push('PPR');
                else if (recValue === 0.5) scoringParts.push('HPPR');
                else if (recValue === 0) scoringParts.push('STD');
                else scoringParts.push('PPR');
                if (bonusRecTe > 0) scoringParts.push(`${recValue + bonusRecTe}TEP`);
                if (league.settings?.best_ball === 1) scoringParts.push('Best Ball');

                html += `<div class="league-card" id="league-${leagueIdx}">
                    <button class="league-header" onclick="toggleLeague(${leagueIdx})">
                        <div>
                            <div class="league-name">${league.name}</div>
                            <div class="league-meta">${league.total_rosters} teams • Season ${league.season} • ID: ${league.league_id}</div>
                            <div class="league-scoring">${scoringParts.join(' ')} &nbsp;·&nbsp; <a href="league.html?id=${league.league_id}" onclick="event.stopPropagation()" style="color:#fbbf24;text-decoration:underline;font-size:0.78rem;">View League →</a></div>
                        </div>
                        <span class="league-chevron">▼</span>
                    </button>`;

                html += `<div class="rosters-container hidden" id="rosters-${leagueIdx}">`;

                if (userRoster) {
                    const allocation = allocateRoster(userRoster, league, tepTier);
                    const rosterReqs = {};
                    league.roster_positions?.forEach(pos => { rosterReqs[pos] = (rosterReqs[pos] || 0) + 1; });
                    const posOrder = ['QB','RB','WR','TE','FLEX','SUPER_FLEX','K','DEF','IR','TAXI','BN'];
                    const reqSummary = posOrder.filter(pos => rosterReqs[pos]).map(pos => `${rosterReqs[pos]} ${pos === 'SUPER_FLEX' ? 'SF' : pos}`).join(', ');

                    html += `<div class="roster-info"><div class="roster-info-title">Roster Requirements (${league.roster_positions.length} players)</div><div class="roster-info-text">${reqSummary}</div></div>`;
                    html += `<div class="roster-info"><div class="roster-info-title">Your Roster Summary</div><div class="roster-info-text">Total Players: ${userRoster.players?.length || 0}</div></div>`;
                    html += `<div class="roster-info"><div class="roster-info-title">Draft Picks</div><div class="roster-info-text">${renderPickInventory(userRoster.roster_id, league.tradedPicks || [], league.rosterMap || {}, league.userMap || {}, league.season)}</div></div>`;

                    const playersByPosition = {};
                    userRoster.players?.forEach(playerId => {
                        const pos = getPlayerData(playerId)?.position || 'N/A';
                        if (!playersByPosition[pos]) playersByPosition[pos] = [];
                        playersByPosition[pos].push(playerId);
                    });

                    const positionOrder = ['QB','RB','WR','TE','K','DEF'];
                    const mainPositions = positionOrder.filter(pos => playersByPosition[pos] && !['K','DEF'].includes(pos));
                    const dkPositions = positionOrder.filter(pos => playersByPosition[pos] && ['K','DEF'].includes(pos));

                    mainPositions.forEach(position => {
                        html += `<div class="position-group"><div class="position-header">${position}</div>`;
                        playersByPosition[position].sort((a, b) => (getPlayerData(a)?.defaultRank || 9999) - (getPlayerData(b)?.defaultRank || 9999)).forEach(playerId => {
                            html += renderPlayerItem(playerId, position, allocation, userRoster);
                        });
                        html += `</div>`;
                    });

                    if (dkPositions.length > 0) {
                        html += `<div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid #1e293b;"><p style="color:#fbbf24;font-weight:600;font-size:0.82rem;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.05em;">Defense / Kicker</p>`;
                        dkPositions.forEach(position => {
                            html += `<div class="position-group"><div class="position-header">${position}</div>`;
                            playersByPosition[position].sort((a, b) => (getPlayerData(a)?.defaultRank || 9999) - (getPlayerData(b)?.defaultRank || 9999)).forEach(playerId => {
                                html += renderPlayerItem(playerId, position, allocation, userRoster);
                            });
                            html += `</div>`;
                        });
                        html += `</div>`;
                    }
                } else {
                    html += `<p style="color:#475569;font-size:0.875rem;">You are not in this league.</p>`;
                }

                html += `</div></div>`;
            });

            html += `</div>`;
            contentDiv.innerHTML = html;
        }

        function renderPlayerItem(playerId, position, allocation, userRoster) {
            const playerObj = getPlayerData(playerId);
            const alloc = allocation[playerId];
            const name = playerObj?.playerName || 'Unknown';
            const team = playerObj?.team || 'N/A';
            const ovrRank = playerObj?.defaultRank < 9999 ? playerObj.defaultRank : 'Unranked';
            const posRank = playerObj?.posRank || '';
            const posNum = posRank ? String(posRank) : '';
            const status = alloc?.finalStatus || 'Unknown';

            const dynastyScore = scorePlayer(playerObj);
            const hasDynastyScore = ['WR','RB','TE','QB'].includes(position) && dynastyScore > 0;
            const isStar = getTier(dynastyScore) === 1;
            const slotIcon = getStatusIcon(status);
            const displayIcon = isStar ? `⭐ ${slotIcon}` : slotIcon;

            const isOnIR = userRoster.reserve?.includes(playerId);
            const isOnTaxi = userRoster.taxi?.includes(playerId);
            const slotFlag = isOnIR ? ' 💔' : (isOnTaxi ? ' 🚕' : '');

            const statusColor = (status.includes('Starter') || status.includes('FLEX')) ? '#34d399'
                : status === 'Bench' ? '#94a3b8'
                : status === 'Trade' ? '#f97316'
                : status === 'Cut' ? '#ef4444'
                : '#94a3b8';

            const borderColor = (status.includes('Starter') || status.includes('FLEX')) ? '#34d399'
                : status === 'Bench' ? '#334155'
                : status === 'Trade' ? '#f97316'
                : status === 'Cut' ? '#ef4444'
                : '#334155';

            const t = getTier(dynastyScore);
            const scoreColor = t === 1 ? '#fbbf24'
                : t === 2 ? '#34d399'
                : t === 3 ? '#94a3b8'
                : dynastyScore > 0 ? '#64748b'
                : '#ef4444';

            const finalBorderColor = hasDynastyScore ? scoreColor : borderColor;

            return `<div class="player-item" style="border-left-color:${finalBorderColor};">
                <div class="player-info">
                    <div class="player-name">${displayIcon}${slotFlag} ${name} <span style="color:#475569;font-weight:400;">(${team})</span></div>
                    <div class="player-meta">Age: ${playerObj?.age || 'N/A'} · Exp: ${playerObj?.yearsExp ?? 'N/A'} yrs · Depth #${playerObj?.depthChartOrder || 'N/A'} ${playerObj?.depthChartPos ? `(${playerObj.depthChartPos})` : ''}</div>
                </div>
                <div class="player-ranks">
                    ${hasDynastyScore
                        ? `<div class="player-ovr" style="color:${scoreColor};font-size:1.1rem;font-weight:700;">${dynastyScore}</div>
                           <div class="player-pos" style="color:#475569;">${position} #${posNum || ovrRank}</div>`
                        : `<div class="player-ovr" style="color:${statusColor};">OVR #${ovrRank}</div>
                           ${posNum ? `<div class="player-pos">${position} #${posNum}</div>` : ''}`
                    }
                </div>
            </div>`;
        }

        function toggleLeague(idx) {
            const rosters = document.getElementById(`rosters-${idx}`);
            const card = document.getElementById(`league-${idx}`);
            rosters.classList.toggle('hidden');
            card.classList.toggle('expanded');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            if (username) fetchSleeperData(username, yearSelect.value);
        });

        window.addEventListener('load', () => {
            fetchSleeperData(usernameInput.value, yearSelect.value);
        });
    </script>
