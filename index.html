<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - Fantasy Football Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header-section {
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .header-title h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .header-icon {
            font-size: 2rem;
            color: #fbbf24;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .main-content {
            max-width: 80rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .search-form {
            margin-bottom: 3rem;
            display: flex;
            gap: 0.75rem;
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 0.75rem 0.75rem 3rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px #fbbf24;
        }

        .year-select {
            padding: 0.75rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .year-select:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px #fbbf24;
        }

        .search-button {
            padding: 0.75rem 1.5rem;
            background: #fbbf24;
            color: #1e293b;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-button:hover:not(:disabled) {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .search-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-container {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(127, 29, 29, 0.3);
            border: 1px solid #7f1d1d;
            border-radius: 0.5rem;
        }

        .error-icon {
            color: #fca5a5;
            flex-shrink: 0;
        }

        .error-title {
            color: #fca5a5;
            font-weight: 600;
            margin: 0;
        }

        .error-message {
            color: #fecaca;
            font-size: 0.875rem;
            margin: 0;
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .loading-icon {
            width: 2rem;
            height: 2rem;
            color: #fbbf24;
            margin-right: 0.75rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .user-card {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: linear-gradient(to right, #1e293b, rgba(30, 41, 59, 0.5));
            border: 1px solid #475569;
            border-radius: 0.75rem;
        }

        .user-avatar {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            border: 2px solid #fbbf24;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .user-username {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .leagues-section {
            margin-bottom: 3rem;
        }

        .leagues-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
        }

        .leagues-grid {
            display: grid;
            gap: 1rem;
        }

        .league-card {
            border: 1px solid #475569;
            border-radius: 0.5rem;
            overflow: hidden;
            transition: all 0.2s;
        }

        .league-card:hover {
            border-color: #64748b;
        }

        .league-header {
            width: 100%;
            padding: 1.5rem;
            background: #1e293b;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .league-header:hover {
            background: #0f172a;
        }

        .league-info {
            text-align: left;
        }

        .league-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .league-meta {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .league-chevron {
            font-size: 1.5rem;
            color: #fbbf24;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .league-card.expanded .league-chevron {
            transform: rotate(180deg);
        }

        .rosters-container {
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid #475569;
            padding: 1.5rem;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .rosters-list {
            display: grid;
            gap: 1rem;
        }

        .roster-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1rem;
            padding: 1rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            align-items: center;
            transition: all 0.2s;
        }

        .roster-item:hover {
            border-color: #fbbf24;
            background: #334155;
        }

        .roster-rank {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(251, 191, 36, 0.2);
            font-weight: 600;
            font-size: 0.875rem;
            color: #fbbf24;
            flex-shrink: 0;
        }

        .roster-details {
            text-align: left;
        }

        .roster-owner {
            font-weight: 600;
            color: white;
            margin: 0;
            font-size: 1rem;
        }

        .roster-record {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .roster-points {
            text-align: right;
        }

        .points-value {
            font-weight: 700;
            font-size: 1.25rem;
            color: #fbbf24;
            margin: 0;
        }

        .points-label {
            font-size: 0.75rem;
            color: #64748b;
            margin: 0.125rem 0 0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .hidden {
            display: none;
        }

        .player-card {
            padding: 0.75rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            border-radius: 0.375rem;
            background: rgba(30, 41, 59, 0.5);
            margin-bottom: 0.5rem;
            border-left: 3px solid;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .player-name-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .player-rank {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            margin-left: 1rem;
        }

        .player-details {
            margin-top: 0.375rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        @media (max-width: 640px) {
            .header-title h1 {
                font-size: 1.5rem;
            }

            .main-content {
                padding: 1.5rem 1rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-button {
                width: 100%;
            }

            .year-select {
                width: 100%;
            }

            .user-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .league-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .roster-item {
                grid-template-columns: auto 1fr;
                gap: 0.75rem;
            }

            .roster-points {
                grid-column: 1 / -1;
                text-align: left;
                padding-top: 0.75rem;
                border-top: 1px solid #475569;
            }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header-content">
            <div class="header-title">
                <span class="header-icon">🏆</span>
                <h1>Sleeper Manager</h1>
                <span style="font-size: 0.85rem; color: #94a3b8; margin-left: auto;">v0.2-beta</span>
            </div>
            <p class="header-subtitle">View your fantasy leagues, rosters, and team management</p>
        </div>
    </div>

    <div class="main-content">
        <form class="search-form" id="searchForm">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="username" 
                    class="search-input" 
                    placeholder="Enter your Sleeper username..."
                    value="ankurdeora"
                >
            </div>
            <select id="year" class="year-select">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button type="submit" class="search-button" id="searchBtn">Search</button>
        </form>

        <div id="content"></div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const searchForm = document.getElementById('searchForm');
        const usernameInput = document.getElementById('username');
        const yearSelect = document.getElementById('year');
        const searchBtn = document.getElementById('searchBtn');

        // Google Sheets configuration
        const SHEET_ID = '1V0Y_Bl7kSy--vABftJUOlXnWflPCi5P_Km6LG9VhEsQ';

        // Data caches
        let playerLookupCache = {};
        let userOverrideCache = {};

        async function fetchGoogleSheetData(sheetName) {
            try {
                // Map sheet names to their gid (tab ID)
                const sheetIds = {
                    'Player_Lookup': '2112770654',
                    'User_Override_Rank': '1983730686'
                };
                
                const gid = sheetIds[sheetName];
                if (!gid) throw new Error(`Unknown sheet: ${sheetName}`);
                
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
                console.log(`📥 Fetching from: ${url}`);
                
                const response = await fetch(url);
                const csv = await response.text();
                
                console.log(`📥 CSV from ${sheetName}:`, csv.substring(0, 300));
                
                // Parse CSV manually with better handling
                const lines = csv.split('\n');
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                console.log(`Headers for ${sheetName}:`, headers);
                
                const rows = [];
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                    const obj = {};
                    headers.forEach((header, idx) => {
                        obj[header] = values[idx] || null;
                    });
                    rows.push(obj);
                }
                
                console.log(`✅ Parsed ${rows.length} rows from ${sheetName}`);
                if (rows.length > 0) {
                    console.log(`Sample row:`, rows[0]);
                }
                
                return rows;
            } catch (err) {
                console.error(`Error fetching ${sheetName}:`, err);
                return [];
            }
        }

        async function initializePlayerData() {
            try {
                console.log('📊 Loading player data from Google Sheets...');
                
                // Fetch Player_Lookup tab
                const playerLookup = await fetchGoogleSheetData('Player_Lookup');
                playerLookupCache = {};
                playerLookup.forEach(row => {
                    if (row['SLEEPER_ID']) {
                        const sleeperId = String(row['SLEEPER_ID']); // Convert to string
                        playerLookupCache[sleeperId] = {
                            playerName: row['PLAYER_NAME'],
                            position: row['POSITION'],
                            age: row['AGE'],
                            team: row['TEAM'],
                            depthChartPos: row['DEPTH_CHART_POS'],
                            depthChartOrder: row['DEPTH_CHART_ORDER'],
                            defaultRank: row['Default_Rank'] || 9999
                        };
                    }
                });
                
                // Fetch User_Override_Rank tab
                const userOverrides = await fetchGoogleSheetData('User_Override_Rank');
                userOverrideCache = {};
                userOverrides.forEach(row => {
                    if (row['SLEEPER_ID'] && row['LEAGUE_ID']) {
                        const sleeperId = String(row['SLEEPER_ID']); // Convert to string
                        const key = `${sleeperId}_${row['LEAGUE_ID']}`;
                        userOverrideCache[key] = {
                            defaultClassification: row['Default_Classification'],
                            overrideClassification: row['Override_Classification'],
                            notes: row['Notes']
                        };
                    }
                });
                
                console.log(`✅ Loaded ${Object.keys(playerLookupCache).length} players`);
                console.log(`✅ Loaded ${Object.keys(userOverrideCache).length} overrides`);
                return true;
            } catch (err) {
                console.error('Error initializing player data:', err);
                return false;
            }
        }

        function getPlayerData(sleeperId) {
            return playerLookupCache[String(sleeperId)] || null;
        }

        function getUserOverride(sleeperId, leagueId) {
            const key = `${String(sleeperId)}_${leagueId}`;
            return userOverrideCache[key] || null;
        }

        function getCategoryColor(category) {
            const colors = {
                'Stars': '#fbbf24',
                'Starters': '#34d399',
                'Bench': '#cbd5e1',
                'Trade Potentials': '#f97316',
                'Cut Candidates': '#ef4444'
            };
            return colors[category] || '#cbd5e1';
        }

        function getCategoryEmoji(category) {
            const emojis = {
                'Stars': '⭐',
                'Starters': '✓',
                'Bench': '—',
                'Trade Potentials': '↔️',
                'Cut Candidates': '✂️'
            };
            return emojis[category] || '';
        }

        function classifyPlayers(userRoster, league, user) {
            if (!userRoster.players || userRoster.players.length === 0) return {};
            
            const rosterSlots = {};
            league.roster_positions?.forEach(pos => {
                rosterSlots[pos] = (rosterSlots[pos] || 0) + 1;
            });
            
            const playersByPosition = {};
            userRoster.players.forEach(playerId => {
                const playerData = getPlayerData(playerId);
                const position = playerData?.position || 'N/A';
                
                if (!playersByPosition[position]) {
                    playersByPosition[position] = [];
                }
                playersByPosition[position].push({
                    playerId,
                    playerData,
                    defaultRank: playerData?.defaultRank || 9999
                });
            });
            
            // Sort players within each position by ECR rank
            Object.keys(playersByPosition).forEach(pos => {
                playersByPosition[pos].sort((a, b) => a.defaultRank - b.defaultRank);
            });
            
            const classification = {};
            
            // Step 1: Allocate position starters (QB includes SUPER_FLEX)
            const positionStarters = {
                'QB': (rosterSlots['QB'] || 0) + (rosterSlots['SUPER_FLEX'] || 0),
                'RB': rosterSlots['RB'] || 0,
                'WR': rosterSlots['WR'] || 0,
                'TE': rosterSlots['TE'] || 0,
                'K': rosterSlots['K'] || 0,
                'DEF': rosterSlots['DEF'] || 0
            };
            
            // Classify position starters
            ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                
                players.forEach((playerData, index) => {
                    if (index < starterCount) {
                        const category = playerData.defaultRank <= 25 ? 'Stars' : 'Starters';
                        classification[playerData.playerId] = {
                            category,
                            position,
                            index,
                            defaultRank: playerData.defaultRank,
                            slotType: 'Position'
                        };
                    }
                });
            });
            
            // Step 2: Collect overflow RB/WR/TE for FLEX allocation
            const flexiblePlayers = [];
            ['RB', 'WR', 'TE'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                
                players.forEach((playerData, index) => {
                    if (index >= starterCount) {
                        flexiblePlayers.push({
                            playerId: playerData.playerId,
                            playerData: playerData.playerData,
                            position,
                            index,
                            defaultRank: playerData.defaultRank
                        });
                    }
                });
            });
            
            flexiblePlayers.sort((a, b) => a.defaultRank - b.defaultRank);
            
            // Step 3: Fill FLEX slots
            const flexSlots = rosterSlots['FLEX'] || 0;
            flexiblePlayers.slice(0, flexSlots).forEach(playerData => {
                const category = playerData.defaultRank <= 25 ? 'Stars' : 'Starters';
                classification[playerData.playerId] = {
                    category,
                    position: playerData.position,
                    index: playerData.index,
                    defaultRank: playerData.defaultRank,
                    slotType: 'FLEX'
                };
            });
            
            // Step 4: Allocate bench spots
            const benchAllocations = {
                'QB': positionStarters['QB'] + 1,
                'RB': positionStarters['RB'] + 2,
                'WR': positionStarters['WR'] + 2,
                'TE': positionStarters['TE'] + 1,
                'K': positionStarters['K'],
                'DEF': positionStarters['DEF']
            };
            
            ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                const benchLimit = benchAllocations[position];
                
                players.forEach((playerData, index) => {
                    if (classification[playerData.playerId]) return;
                    
                    if (index < benchLimit) {
                        classification[playerData.playerId] = {
                            category: 'Bench',
                            position,
                            index,
                            defaultRank: playerData.defaultRank,
                            slotType: 'Bench'
                        };
                    }
                });
            });
            
            // Step 5: Handle remaining FLEX/RB/WR players
            flexiblePlayers.slice(flexSlots).forEach(playerData => {
                if (classification[playerData.playerId]) return;
                
                const benchLimit = benchAllocations[playerData.position];
                
                if (playerData.index < benchLimit) {
                    classification[playerData.playerId] = {
                        category: 'Bench',
                        position: playerData.position,
                        index: playerData.index,
                        defaultRank: playerData.defaultRank,
                        slotType: 'Bench'
                    };
                } else {
                    const defaultRank = playerData.defaultRank;
                    const age = playerData.playerData?.age || 0;
                    
                    const category = (defaultRank > 500 || age > 32) ? 'Cut Candidates' : 'Trade Potentials';
                    classification[playerData.playerId] = {
                        category,
                        position: playerData.position,
                        index: playerData.index,
                        defaultRank: playerData.defaultRank,
                        slotType: 'Overflow'
                    };
                }
            });
            
            // Step 6: Classify remaining unclassified
            userRoster.players.forEach(playerId => {
                if (!classification[playerId]) {
                    const playerObj = getPlayerData(playerId);
                    const position = playerObj?.position || 'N/A';
                    const defaultRank = playerObj?.defaultRank || 9999;
                    const age = playerObj?.age || 0;
                    
                    const category = (defaultRank > 500 || age > 32) ? 'Cut Candidates' : 'Trade Potentials';
                    classification[playerId] = {
                        category,
                        position,
                        defaultRank,
                        slotType: 'Overflow'
                    };
                }
            });
            
            return classification;
        }

        function checkPositionalShortages(userRoster, league, classification) {
            const rosterSlots = {};
            league.roster_positions?.forEach(pos => {
                rosterSlots[pos] = (rosterSlots[pos] || 0) + 1;
            });
            
            const positionBenchMinimums = {
                'QB': 1,
                'RB': 2,
                'WR': 2,
                'TE': 1,
                'K': 0,
                'DEF': 0
            };
            
            const shortages = [];
            
            // Check for missing required positions
            ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(position => {
                const requiredSlots = rosterSlots[position] || 0;
                if (requiredSlots > 0) {
                    const playerCount = userRoster.players.filter(playerId => {
                        const playerData = getPlayerData(playerId);
                        return playerData?.position === position;
                    }).length;
                    
                    if (playerCount === 0) {
                        shortages.push(`Missing: 1 ${position}`);
                    }
                }
            });
            
            // Check for positional bench shortages
            ['QB', 'RB', 'WR', 'TE'].forEach(position => {
                const requiredSlots = rosterSlots[position] || 0;
                const benchMinimum = positionBenchMinimums[position];
                const totalNeeded = requiredSlots + benchMinimum;
                
                if (totalNeeded > 0) {
                    const playerCount = userRoster.players.filter(playerId => {
                        const playerData = getPlayerData(playerId);
                        return playerData?.position === position;
                    }).length;
                    
                    if (playerCount < totalNeeded) {
                        const shortfall = totalNeeded - playerCount;
                        shortages.push(`${position} Bench Shortage: need ${benchMinimum}, have ${Math.max(0, playerCount - requiredSlots)}`);
                    }
                }
            });
            
            return shortages;
        }

        function summarizeRosterPositions(positions) {
            const summary = {};
            positions.forEach(pos => {
                summary[pos] = (summary[pos] || 0) + 1;
            });
            
            const positionOrder = ['QB', 'RB', 'WR', 'TE', 'FLEX', 'SUPER_FLEX', 'IR', 'TAXI', 'BN'];
            const result = [];
            positionOrder.forEach(pos => {
                if (summary[pos]) {
                    const displayPos = pos === 'SUPER_FLEX' ? 'Super Flex' : pos;
                    result.push(`${summary[pos]} ${displayPos}`);
                }
            });
            
            Object.keys(summary).forEach(pos => {
                if (!positionOrder.includes(pos)) {
                    result.push(`${summary[pos]} ${pos}`);
                }
            });
            
            return result.join(', ');
        }

        async function fetchSleeperData(username, year) {
            try {
                searchBtn.disabled = true;
                searchBtn.textContent = 'Loading...';
                contentDiv.innerHTML = '<div class="loading-container"><span class="loading-icon">⏳</span><span>Fetching your data...</span></div>';

                // Initialize player data from Google Sheets first
                const dataReady = await initializePlayerData();
                if (!dataReady) {
                    throw new Error('Could not load player data from Google Sheets');
                }

                const userRes = await fetch(`https://api.sleeper.app/v1/user/${username}`);
                if (!userRes.ok) throw new Error('Username not found');
                const user = await userRes.json();

                const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year}`);
                if (!leaguesRes.ok) throw new Error('Could not fetch leagues');
                const leagues = await leaguesRes.json();

                const leaguesWithRosters = await Promise.all(
                    leagues.map(async (league) => {
                        try {
                            const rostersRes = await fetch(`https://api.sleeper.app/v1/league/${league.league_id}/rosters`);
                            const rosters = await rostersRes.json();
                            return { ...league, rosters: rosters.sort((a, b) => (b.wins || 0) - (a.wins || 0)) };
                        } catch {
                            return { ...league, rosters: [] };
                        }
                    })
                );

                renderUI(user, leaguesWithRosters);
            } catch (err) {
                contentDiv.innerHTML = `<div class="error-container"><span class="error-icon">⚠️</span><div><p class="error-title">Error</p><p class="error-message">${err.message}</p></div></div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
            }
        }

        function renderUI(user, leagues) {
            let html = '<div class="user-card">';
            if (user.avatar) {
                html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" alt="${user.username}" class="user-avatar" />`;
            }
            html += `<div><h2 class="user-name">${user.display_name}</h2><p class="user-username">@${user.username} • ID: ${user.user_id}</p><p class="user-username">${leagues.length} league${leagues.length !== 1 ? 's' : ''}</p></div></div>`;

            html += `<div class="leagues-section"><h3 class="leagues-title"><span style="font-size: 1.5rem;">🏆</span> Your Leagues (${leagues.length})</h3><div class="leagues-grid">`;
            
            leagues.forEach((league, leagueIdx) => {
                const userRoster = league.rosters ? league.rosters.find(r => r.owner_id === user.user_id) : null;
                
                // Determine scoring type from actual league settings
                let scoringType = 'PPR';
                const hasSuperFlex = league.roster_positions?.includes('SUPER_FLEX');
                const scoringSettings = league.scoring_settings || {};
                
                const scoringParts = [];
                
                if (hasSuperFlex) {
                    scoringParts.push('SF');
                }
                
                const recValue = scoringSettings.rec;
                if (recValue === 1) {
                    scoringParts.push('PPR');
                } else if (recValue === 0.5) {
                    scoringParts.push('HPPR');
                } else if (recValue === 0) {
                    scoringParts.push('STD');
                } else {
                    scoringParts.push('PPR');
                }
                
                if (scoringSettings.bonus_rec_te > 0) {
                    const tepMultiplier = recValue + scoringSettings.bonus_rec_te;
                    scoringParts.push(`${tepMultiplier}TEP`);
                }
                
                if (league.settings?.best_ball === 1) {
                    scoringParts.push('Best Ball');
                }
                
                scoringType = scoringParts.join(' ');
                
                html += `<div class="league-card" id="league-${leagueIdx}"><button class="league-header" onclick="toggleLeague(${leagueIdx})"><div class="league-info"><h3 class="league-name">${league.name}</h3><p class="league-meta">${league.total_rosters} teams • Season ${league.season} • ID: ${league.league_id}</p><p class="league-meta" style="color: #fbbf24; margin-top: 0.375rem;">Scoring: ${scoringType} | ${league.total_rosters} Teams</p></div><span class="league-chevron">▼</span></button><div class="rosters-container hidden" id="rosters-${leagueIdx}"><div class="rosters-list">`;
                
                if (userRoster) {
                    if (league.roster_positions) {
                        const rosterSummary = summarizeRosterPositions(league.roster_positions);
                        html += `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #475569;"><p style="color: #fbbf24; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem;">Roster Requirements (${league.roster_positions.length} players):</p><p style="color: #cbd5e1; font-size: 0.85rem;">${rosterSummary}</p></div>`;
                    }
                    
                    if (userRoster.players && userRoster.players.length > 0) {
                        const playerClassification = classifyPlayers(userRoster, league, user);
                        const shortages = checkPositionalShortages(userRoster, league, playerClassification);
                        
                        // Display shortage warnings if any
                        if (shortages.length > 0) {
                            html += `<div style="margin-top: 1rem; padding: 0.75rem; background: rgba(239, 68, 68, 0.2); border: 1px solid #dc2626; border-radius: 0.375rem; margin-bottom: 1rem;">`;
                            html += `<p style="color: #fca5a5; font-weight: 600; margin: 0 0 0.5rem 0; font-size: 0.9rem;">⚠️ Roster Alerts</p>`;
                            shortages.forEach(shortage => {
                                html += `<p style="color: #fecaca; margin: 0.25rem 0; font-size: 0.85rem;">• ${shortage}</p>`;
                            });
                            html += `</div>`;
                        }
                        
                        const playersByPosition = {};
                        
                        userRoster.players.forEach(playerId => {
                            const playerData = getPlayerData(playerId);
                            const position = playerData?.position || 'N/A';
                            if (!playersByPosition[position]) {
                                playersByPosition[position] = [];
                            }
                            playersByPosition[position].push({ playerId, playerData });
                        });
                        
                        // Count players by position for summary
                        const positionCounts = {};
                        ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(pos => {
                            if (playersByPosition[pos]) {
                                positionCounts[pos] = playersByPosition[pos].length;
                            }
                        });
                        
                        const positionSummary = [];
                        ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(pos => {
                            if (positionCounts[pos]) {
                                positionSummary.push(`${positionCounts[pos]} ${pos}`);
                            }
                        });
                        
                        html += '<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #475569;">';
                        html += `<p style="color: #fbbf24; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem;">Your Roster (${userRoster.players.length} players):</p><p style="color: #cbd5e1; font-size: 0.85rem; margin-bottom: 1rem;">${positionSummary.join(', ')}</p>`;
                        
                        const positionOrder = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF', 'FLEX', 'SUPER_FLEX', 'BN', 'IR', 'TAXI'];
                        const sortedPositions = positionOrder.filter(pos => playersByPosition[pos]);
                        Object.keys(playersByPosition).forEach(pos => {
                            if (!positionOrder.includes(pos)) {
                                sortedPositions.push(pos);
                            }
                        });
                        
                        sortedPositions.forEach(position => {
                            const positionPlayers = playersByPosition[position].sort((a, b) => {
                                const rankA = a.playerData?.defaultRank || 9999;
                                const rankB = b.playerData?.defaultRank || 9999;
                                return rankA - rankB;
                            });
                            
                            const displayPos = position === 'SUPER_FLEX' ? 'Super Flex' : position;
                            html += `<div style="margin-bottom: 1rem;">`;
                            html += `<p style="color: #94a3b8; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem;">━━ ${displayPos} ━━</p>`;
                            
                            positionPlayers.forEach(({ playerId, playerData }) => {
                                const playerName = playerData ? `${playerData.playerName || playerData.position}` : `Player ${playerId}`;
                                const team = playerData?.team || 'N/A';
                                const defaultRank = playerData?.defaultRank && playerData.defaultRank < 9999 ? `#${playerData.defaultRank}` : 'Unranked';
                                const rankColor = playerData?.defaultRank && playerData.defaultRank <= 12 ? '#fbbf24' : '#cbd5e1';
                                
                                const classification = playerClassification[playerId];
                                const categoryColor = getCategoryColor(classification?.category);
                                const categoryEmoji = getCategoryEmoji(classification?.category);
                                
                                const age = playerData?.age || 'N/A';
                                const depthPos = playerData?.depthChartPos || 'N/A';
                                const depthOrder = playerData?.depthChartOrder || 'N/A';
                                
                                html += `<div class="player-card" style="border-left-color: ${categoryColor};">`;
                                html += `<div class="player-header">`;
                                html += `<div class="player-name-section">`;
                                html += `<span style="color: ${categoryColor}; font-weight: 600;">${categoryEmoji} ${classification?.category || 'N/A'}</span>`;
                                html += `<strong style="color: white;">${playerName}</strong>`;
                                html += `<span style="color: #64748b;">(${team})</span>`;
                                html += `</div>`;
                                html += `<span class="player-rank" style="color: ${rankColor};">${defaultRank}</span>`;
                                html += `</div>`;
                                html += `<div class="player-details">Age: ${age} | Depth: ${depthPos} #${depthOrder}</div>`;
                                html += `</div>`;
                            });
                            
                            html += `</div>`;
                        });
                        
                        html += '</div>';
                    }
                } else {
                    html += '<p style="color: #94a3b8;">You are not in this league</p>';
                }
                
                html += '</div></div></div>';
            });

            html += '</div></div>';
            contentDiv.innerHTML = html;
        }

        function toggleLeague(idx) {
            const rosters = document.getElementById(`rosters-${idx}`);
            const card = document.getElementById(`league-${idx}`);
            rosters.classList.toggle('hidden');
            card.classList.toggle('expanded');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const year = yearSelect.value;
            if (username) {
                fetchSleeperData(username, year);
            }
        });

        window.addEventListener('load', () => {
            const year = yearSelect.value;
            fetchSleeperData(usernameInput.value, year);
        });
    </script>
</body>
</html>
