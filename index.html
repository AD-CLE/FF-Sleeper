<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - Fantasy Football Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header-section {
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 0.75rem;
            color: #64748b;
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .header-title h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .header-icon {
            font-size: 2rem;
            color: #fbbf24;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .main-content {
            max-width: 80rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .search-form {
            margin-bottom: 3rem;
            display: flex;
            gap: 0.75rem;
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 0.75rem 0.75rem 3rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px #fbbf24;
        }

        .year-select {
            padding: 0.75rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .year-select:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px #fbbf24;
        }

        .search-button {
            padding: 0.75rem 1.5rem;
            background: #fbbf24;
            color: #1e293b;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-button:hover:not(:disabled) {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .search-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-container {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(127, 29, 29, 0.3);
            border: 1px solid #7f1d1d;
            border-radius: 0.5rem;
        }

        .error-icon {
            color: #fca5a5;
            flex-shrink: 0;
        }

        .error-title {
            color: #fca5a5;
            font-weight: 600;
            margin: 0;
        }

        .error-message {
            color: #fecaca;
            font-size: 0.875rem;
            margin: 0;
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .loading-icon {
            width: 2rem;
            height: 2rem;
            color: #fbbf24;
            margin-right: 0.75rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .user-card {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: linear-gradient(to right, #1e293b, rgba(30, 41, 59, 0.5));
            border: 1px solid #475569;
            border-radius: 0.75rem;
        }

        .user-avatar {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            border: 2px solid #fbbf24;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .user-username {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .leagues-section {
            margin-bottom: 3rem;
        }

        .leagues-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
        }

        .leagues-grid {
            display: grid;
            gap: 1rem;
        }

        .league-card {
            border: 1px solid #475569;
            border-radius: 0.5rem;
            overflow: hidden;
            transition: all 0.2s;
        }

        .league-card:hover {
            border-color: #64748b;
        }

        .league-header {
            width: 100%;
            padding: 1.5rem;
            background: #1e293b;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .league-header:hover {
            background: #0f172a;
        }

        .league-info {
            text-align: left;
        }

        .league-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .league-meta {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .league-chevron {
            font-size: 1.5rem;
            color: #fbbf24;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .league-card.expanded .league-chevron {
            transform: rotate(180deg);
        }

        .rosters-container {
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid #475569;
            padding: 1.5rem;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .rosters-list {
            display: grid;
            gap: 1rem;
        }

        .roster-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1rem;
            padding: 1rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            align-items: center;
            transition: all 0.2s;
        }

        .roster-item:hover {
            border-color: #fbbf24;
            background: #334155;
        }

        .roster-rank {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(251, 191, 36, 0.2);
            font-weight: 600;
            font-size: 0.875rem;
            color: #fbbf24;
            flex-shrink: 0;
        }

        .roster-details {
            text-align: left;
        }

        .roster-owner {
            font-weight: 600;
            color: white;
            margin: 0;
            font-size: 1rem;
        }

        .roster-record {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0.25rem 0 0;
        }

        .roster-points {
            text-align: right;
        }

        .points-value {
            font-weight: 700;
            font-size: 1.25rem;
            color: #fbbf24;
            margin: 0;
        }

        .points-label {
            font-size: 0.75rem;
            color: #64748b;
            margin: 0.125rem 0 0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 640px) {
            .header-title h1 {
                font-size: 1.5rem;
            }

            .main-content {
                padding: 1.5rem 1rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-button {
                width: 100%;
            }

            .year-select {
                width: 100%;
            }

            .user-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .league-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .roster-item {
                grid-template-columns: auto 1fr;
                gap: 0.75rem;
            }

            .roster-points {
                grid-column: 1 / -1;
                text-align: left;
                padding-top: 0.75rem;
                border-top: 1px solid #475569;
            }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header-content">
            <span class="version-badge">v1.7.3-beta</span>
            <div class="header-title">
                <span class="header-icon">🏆</span>
                <h1>Sleeper Manager</h1>
            </div>
            <p class="header-subtitle">View your fantasy leagues, rosters, and team management</p>
        </div>
    </div>

    <div class="main-content">
        <form class="search-form" id="searchForm">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="username" 
                    class="search-input" 
                    placeholder="Enter your Sleeper username..."
                    value="ankurdeora"
                >
            </div>
            <select id="year" class="year-select">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button type="submit" class="search-button" id="searchBtn">Search</button>
        </form>

        <div id="content"></div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const searchForm = document.getElementById('searchForm');
        const usernameInput = document.getElementById('username');
        const yearSelect = document.getElementById('year');
        const searchBtn = document.getElementById('searchBtn');

        function classifyPlayers(userRoster, league, user) {
            if (!userRoster.players || userRoster.players.length === 0) return {};
            
            const rosterSlots = {};
            league.roster_positions?.forEach(pos => {
                rosterSlots[pos] = (rosterSlots[pos] || 0) + 1;
            });
            
            const playersByPosition = {};
            userRoster.players.forEach(playerId => {
                const player = league.players?.[playerId];
                const position = player?.position || 'N/A';
                
                if (!playersByPosition[position]) {
                    playersByPosition[position] = [];
                }
                playersByPosition[position].push({
                    playerId,
                    player,
                    searchRank: player?.search_rank || Infinity
                });
            });
            
            // Sort players within each position by search_rank
            Object.keys(playersByPosition).forEach(pos => {
                playersByPosition[pos].sort((a, b) => a.searchRank - b.searchRank);
            });
            
            const classification = {};
            
            // Step 1: Allocate position starters
            const positionStarters = {
                'QB': (rosterSlots['QB'] || 0) + (rosterSlots['SUPER_FLEX'] || 0),
                'RB': rosterSlots['RB'] || 0,
                'WR': rosterSlots['WR'] || 0,
                'TE': rosterSlots['TE'] || 0,
                'K': rosterSlots['K'] || 0,
                'DEF': rosterSlots['DEF'] || 0
            };
            
            // Classify position starters
            ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                
                players.forEach((playerData, index) => {
                    if (index < starterCount) {
                        const category = playerData.searchRank <= 12 ? 'Stars' : 'Starters';
                        classification[playerData.playerId] = {
                            category,
                            position,
                            index,
                            searchRank: playerData.searchRank,
                            slotType: 'Position'
                        };
                    }
                });
            });
            
            // Step 2: Collect overflow RB/WR/TE for FLEX allocation
            const flexiblePlayers = [];
            ['RB', 'WR', 'TE'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                
                players.forEach((playerData, index) => {
                    if (index >= starterCount) {
                        flexiblePlayers.push({
                            playerId: playerData.playerId,
                            player: playerData.player,
                            position,
                            index,
                            searchRank: playerData.searchRank
                        });
                    }
                });
            });
            
            flexiblePlayers.sort((a, b) => a.searchRank - b.searchRank);
            
            // Step 3: Fill FLEX slots (scoring positions - before bench!)
            const flexSlots = rosterSlots['FLEX'] || 0;
            
            flexiblePlayers.slice(0, flexSlots).forEach(playerData => {
                const category = playerData.searchRank <= 12 ? 'Stars' : 'Starters';
                classification[playerData.playerId] = {
                    category,
                    position: playerData.position,
                    index: playerData.index,
                    searchRank: playerData.searchRank,
                    slotType: 'FLEX'
                };
            });
            
            // Step 4: Allocate bench spots (only for non-FLEX positions)
            const benchAllocations = {
                'QB': positionStarters['QB'] + 1,
                'RB': positionStarters['RB'] + 2,
                'WR': positionStarters['WR'] + 2,
                'TE': positionStarters['TE'] + 1,
                'K': positionStarters['K'],
                'DEF': positionStarters['DEF']
            };
            
            ['QB', 'RB', 'WR', 'TE', 'K', 'DEF'].forEach(position => {
                const players = playersByPosition[position] || [];
                const starterCount = positionStarters[position];
                const benchLimit = benchAllocations[position];
                
                players.forEach((playerData, index) => {
                    // Skip if already classified as starter
                    if (classification[playerData.playerId]) return;
                    
                    if (index < benchLimit) {
                        classification[playerData.playerId] = {
                            category: 'Bench',
                            position,
                            index,
                            searchRank: playerData.searchRank,
                            slotType: 'Bench'
                        };
                    }
                });
            });
            
            // Step 5: Handle remaining FLEX/RB/WR players (beyond FLEX allocation)
            flexiblePlayers.slice(flexSlots).forEach(playerData => {
                if (classification[playerData.playerId]) return; // Already classified
                
                const benchLimit = benchAllocations[playerData.position];
                
                if (playerData.index < benchLimit) {
                    // Still within bench allocation
                    classification[playerData.playerId] = {
                        category: 'Bench',
                        position: playerData.position,
                        index: playerData.index,
                        searchRank: playerData.searchRank,
                        slotType: 'Bench'
                    };
                } else {
                    // Beyond bench allocation
                    const searchRank = playerData.searchRank;
                    const age = playerData.player?.age || 0;
                    
                    const category = (searchRank > 500 || age > 32) ? 'Cut Candidates' : 'Trade Potentials';
                    classification[playerData.playerId] = {
                        category,
                        position: playerData.position,
                        index: playerData.index,
                        searchRank: playerData.searchRank,
                        slotType: 'Overflow'
                    };
                }
            });
            
            // Step 6: Classify remaining unclassified as Trade/Cut
            userRoster.players.forEach(playerId => {
                if (!classification[playerId]) {
                    const playerObj = league.players?.[playerId];
                    const position = playerObj?.position || 'N/A';
                    const searchRank = playerObj?.search_rank || Infinity;
                    const age = playerObj?.age || 0;
                    
                    const category = (searchRank > 500 || age > 32) ? 'Cut Candidates' : 'Trade Potentials';
                    classification[playerId] = {
                        category,
                        position,
                        searchRank,
                        slotType: 'Overflow'
                    };
                }
            });
            
            return classification;
        }

        function getCategoryColor(category) {
            const colors = {
                'Stars': '#fbbf24',
                'Starters': '#34d399',
                'Bench': '#cbd5e1',
                'Trade Potentials': '#f97316',
                'Cut Candidates': '#ef4444'
            };
            return colors[category] || '#cbd5e1';
        }

        function getCategoryEmoji(category) {
            const emojis = {
                'Stars': '⭐',
                'Starters': '✓',
                'Bench': '—',
                'Trade Potentials': '↔️',
                'Cut Candidates': '✂️'
            };
            return emojis[category] || '';
        }

        function summarizeRosterPositions(positions) {
            const summary = {};
            positions.forEach(pos => {
                summary[pos] = (summary[pos] || 0) + 1;
            });
            
            // Define position order - BN last
            const positionOrder = ['QB', 'RB', 'WR', 'TE', 'FLEX', 'SUPER_FLEX', 'IR', 'TAXI', 'BN'];
            const result = [];
            positionOrder.forEach(pos => {
                if (summary[pos]) {
                    result.push(`${summary[pos]} ${pos}`);
                }
            });
            
            // Add any remaining positions not in the standard order
            Object.keys(summary).forEach(pos => {
                if (!positionOrder.includes(pos)) {
                    result.push(`${summary[pos]} ${pos}`);
                }
            });
            
            return result.join(', ');
        }

        async function fetchSleeperData(username, year) {
            try {
                searchBtn.disabled = true;
                searchBtn.textContent = 'Loading...';
                contentDiv.innerHTML = '<div class="loading-container"><span class="loading-icon">⏳</span><span>Fetching your data...</span></div>';

                const userRes = await fetch(`https://api.sleeper.app/v1/user/${username}`);
                if (!userRes.ok) throw new Error('Username not found');
                const user = await userRes.json();

                const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year}`);
                if (!leaguesRes.ok) throw new Error('Could not fetch leagues');
                const leagues = await leaguesRes.json();

                let allPlayers = {};
                try {
                    const playersRes = await fetch(`https://api.sleeper.app/v1/players/nfl`);
                    if (playersRes.ok) {
                        allPlayers = await playersRes.json();
                    }
                } catch (e) {
                    console.log('Could not fetch players');
                }

                const leaguesWithRosters = await Promise.all(
                    leagues.map(async (league) => {
                        try {
                            const rostersRes = await fetch(`https://api.sleeper.app/v1/league/${league.league_id}/rosters`);
                            const rosters = await rostersRes.json();
                            return { ...league, rosters: rosters.sort((a, b) => (b.wins || 0) - (a.wins || 0)), players: allPlayers };
                        } catch {
                            return { ...league, rosters: [], players: allPlayers };
                        }
                    })
                );

                renderUI(user, leaguesWithRosters);
                
                // Log league data for testing
                console.log('=== LEAGUE DATA TEST ===');
                leaguesWithRosters.forEach((league, idx) => {
                    console.log(`\n=== League ${idx + 1}: ${league.name} ===`);
                    console.log('League ID:', league.league_id);
                    console.log('Total Rosters:', league.total_rosters);
                    console.log('Season:', league.season);
                    console.log('Roster Positions:', league.roster_positions);
                    console.log('Scoring Settings:', league.scoring_settings);
                    console.log('Settings (full):', league.settings);
                });
            } catch (err) {
                contentDiv.innerHTML = `<div class="error-container"><span class="error-icon">⚠️</span><div><p class="error-title">Error</p><p class="error-message">${err.message}</p></div></div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
            }
        }

        function renderUI(user, leagues) {
            let html = '<div class="user-card">';
            if (user.avatar) {
                html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" alt="${user.username}" class="user-avatar" />`;
            }
            html += `<div><h2 class="user-name">${user.display_name}</h2><p class="user-username">@${user.username} • ID: ${user.user_id}</p><p class="user-username">${leagues.length} league${leagues.length !== 1 ? 's' : ''}</p></div></div>`;

            html += '<div class="leagues-section"><h3 class="leagues-title"><span style="font-size: 1.5rem;">🏆</span> Your Leagues (${leagues.length})</h3><div class="leagues-grid">';
            
            leagues.forEach((league, leagueIdx) => {
                const userRoster = league.rosters ? league.rosters.find(r => r.owner_id === user.user_id) : null;
                
                // Determine scoring type from actual league settings
                let scoringType = 'PPR';
                const hasSuperFlex = league.roster_positions?.includes('SUPER_FLEX');
                const scoringSettings = league.scoring_settings || {};
                
                const scoringParts = [];
                
                // SF vs PPR scoring
                if (hasSuperFlex) {
                    scoringParts.push('SF');
                }
                
                // PPR vs HPPR vs STD
                const recValue = scoringSettings.rec;
                if (recValue === 1) {
                    scoringParts.push('PPR');
                } else if (recValue === 0.5) {
                    scoringParts.push('HPPR');
                } else if (recValue === 0) {
                    scoringParts.push('STD');
                } else {
                    scoringParts.push('PPR'); // default to PPR
                }
                
                // TE Premium - calculate exact multiplier
                if (scoringSettings.bonus_rec_te > 0) {
                    const tepMultiplier = recValue + scoringSettings.bonus_rec_te;
                    scoringParts.push(`${tepMultiplier}TEP`);
                }
                
                // Best Ball
                if (league.settings?.best_ball === 1) {
                    scoringParts.push('Best Ball');
                }
                
                scoringType = scoringParts.join(' ');
                
                html += `<div class="league-card" id="league-${leagueIdx}"><button class="league-header" onclick="toggleLeague(${leagueIdx})"><div class="league-info"><h3 class="league-name">${league.name}</h3><p class="league-meta">${league.total_rosters} teams • Season ${league.season} • ID: ${league.league_id}</p><p class="league-meta" style="color: #fbbf24; margin-top: 0.375rem;">Scoring: ${scoringType} | ${league.total_rosters} Teams</p></div><span class="league-chevron">▼</span></button><div class="rosters-container hidden" id="rosters-${leagueIdx}"><div class="rosters-list">`;
                
                if (userRoster) {
                    
                    if (league.roster_positions) {
                        const rosterSummary = summarizeRosterPositions(league.roster_positions);
                        html += `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #475569;"><p style="color: #fbbf24; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem;">Roster Requirements (${league.roster_positions.length} players):</p><p style="color: #cbd5e1; font-size: 0.85rem;">${rosterSummary}</p></div>`;
                    }
                    
                    if (userRoster.players && userRoster.players.length > 0) {
                        const playerClassification = classifyPlayers(userRoster, league, user);
                        const playersByPosition = {};
                        
                        userRoster.players.forEach(playerId => {
                            const player = league.players && league.players[playerId];
                            const position = player ? player.position || 'N/A' : 'N/A';
                            if (!playersByPosition[position]) {
                                playersByPosition[position] = [];
                            }
                            playersByPosition[position].push({ playerId, player });
                        });
                        
                        const positionOrder = ['QB', 'RB', 'WR', 'TE', 'K', 'DEF', 'FLEX', 'SUPERFLEX', 'BN', 'IR', 'TAXI'];
                        const sortedPositions = positionOrder.filter(pos => playersByPosition[pos]);
                        Object.keys(playersByPosition).forEach(pos => {
                            if (!positionOrder.includes(pos)) {
                                sortedPositions.push(pos);
                            }
                        });
                        
                        html += `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #475569;"><p style="color: #fbbf24; font-weight: 600; margin-bottom: 0.75rem; font-size: 0.95rem;">Your Roster (${userRoster.players.length} players):</p>`;
                        
                        sortedPositions.forEach(position => {
                            const positionPlayers = playersByPosition[position].sort((a, b) => {
                                const rankA = a.player?.search_rank || Infinity;
                                const rankB = b.player?.search_rank || Infinity;
                                return rankA - rankB;
                            });
                            
                            html += `<div style="margin-bottom: 1rem;"><p style="color: #94a3b8; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem;">━━ ${position} ━━</p>`;
                            
                            positionPlayers.forEach(({ playerId, player }) => {
                                const playerName = player ? `${player.first_name || ''} ${player.last_name || ''}`.trim() : playerId;
                                const team = player ? player.team || 'N/A' : 'N/A';
                                const searchRank = player && player.search_rank ? `#${player.search_rank}` : 'Unranked';
                                const rankColor = player && player.search_rank && player.search_rank <= 12 ? '#fbbf24' : '#cbd5e1';
                                
                                const classification = playerClassification[playerId];
                                const categoryColor = getCategoryColor(classification?.category);
                                const categoryEmoji = getCategoryEmoji(classification?.category);
                                
                                const age = player?.age || 'N/A';
                                const depthPos = player?.depth_chart_position || 'N/A';
                                const depthOrder = player?.depth_chart_order || 'N/A';
                                
                                html += `<div style="padding: 0.75rem; color: #cbd5e1; font-size: 0.9rem; border-radius: 0.375rem; background: rgba(30, 41, 59, 0.5); margin-bottom: 0.5rem; border-left: 3px solid ${categoryColor};"><div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;"><div><div style="display: flex; align-items: center; gap: 0.5rem;"><span style="color: ${categoryColor}; font-weight: 600;">${categoryEmoji} ${classification?.category || 'N/A'}</span><strong style="color: white;">${playerName}</strong><span style="color: #64748b;">(${team})</span></div><div style="margin-top: 0.375rem; font-size: 0.8rem; color: #94a3b8;">Age: ${age} | Depth: ${depthPos} #${depthOrder}</div></div><span style="color: ${rankColor}; font-weight: 600; font-size: 0.85rem; white-space: nowrap; margin-left: 1rem;">${searchRank}</span></div></div>`;
                            });
                            
                            html += `</div>`;
                        });
                        
                        html += '</div>';
                    }
                } else {
                    html += '<p style="color: #94a3b8;">You are not in this league</p>';
                }
                
                html += '</div></div></div>';
            });

            html += '</div></div>';
            contentDiv.innerHTML = html;
        }

        function toggleLeague(idx) {
            const rosters = document.getElementById(`rosters-${idx}`);
            const card = document.getElementById(`league-${idx}`);
            rosters.classList.toggle('hidden');
            card.classList.toggle('expanded');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const year = yearSelect.value;
            if (username) {
                fetchSleeperData(username, year);
            }
        });

        window.addEventListener('load', () => {
            const year = yearSelect.value;
            fetchSleeperData(usernameInput.value, year);
        });
    </script>
</body>
</html>
