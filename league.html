<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - League View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ── */
        .nav {
            background: rgba(10, 16, 30, 0.95);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            height: 56px;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbf24;
            text-decoration: none;
            letter-spacing: -0.02em;
            margin-right: 2rem;
            flex-shrink: 0;
        }

        .nav-links { display: flex; align-items: center; gap: 0.25rem; flex: 1; }

        .nav-link {
            padding: 0.4rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-link:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-link.active { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .nav-version { font-size: 0.7rem; color: #475569; font-family: monospace; margin-left: auto; }

        /* ── HEADER ── */
        .header-section {
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(15, 23, 42, 0.6);
            padding: 2rem 1.5rem;
        }

        .header-content { max-width: 80rem; margin: 0 auto; }
        .header-content h1 { font-size: 1.75rem; font-weight: 700; color: white; margin-bottom: 0.35rem; }
        .header-subtitle { color: #64748b; font-size: 0.9rem; }

        /* ── MAIN ── */
        .main-content { max-width: 80rem; margin: 0 auto; padding: 2.5rem 1.5rem; }

        /* ── LEAGUE PICKER ── */
        .league-picker {
            margin-bottom: 2.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .league-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.95rem;
        }

        .league-input:focus { outline: none; border-color: #fbbf24; }
        .league-input::placeholder { color: #475569; }

        .load-btn {
            padding: 0.75rem 1.5rem;
            background: #fbbf24;
            color: #0f172a;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .load-btn:hover:not(:disabled) { background: #f59e0b; }
        .load-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── GRADE CARDS ── */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .team-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            overflow: hidden;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .team-card:hover { border-color: #475569; }

        .team-card-header {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .team-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .team-avatar-placeholder {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: rgba(251,191,36,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            color: #fbbf24;
        }

        .team-info { flex: 1; }
        .team-name { font-weight: 700; color: white; font-size: 0.95rem; }
        .team-manager { font-size: 0.8rem; color: #64748b; margin-top: 0.15rem; }
        .team-record { font-size: 0.8rem; color: #94a3b8; margin-top: 0.15rem; }

        .grade-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .grade-contender { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
        .grade-middling { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .grade-rebuilding { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
        .grade-oblivious { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .team-score-bar {
            padding: 0 1.25rem 1rem;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .score-label { font-size: 0.75rem; color: #475569; width: 4rem; flex-shrink: 0; }
        .score-track {
            flex: 1;
            height: 5px;
            background: #0f172a;
            border-radius: 99px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.8s ease;
        }

        .score-val { font-size: 0.75rem; color: #94a3b8; width: 2rem; text-align: right; flex-shrink: 0; }

        .team-top-players {
            padding: 0 1.25rem 1rem;
            border-top: 1px solid #0f172a;
            padding-top: 0.75rem;
        }

        .top-player-label { font-size: 0.72rem; color: #475569; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .top-player-pill {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(15,23,42,0.8);
            border-radius: 99px;
            font-size: 0.75rem;
            color: #cbd5e1;
            margin: 0.15rem 0.15rem 0.15rem 0;
        }

        .expand-btn {
            width: 100%;
            padding: 0.6rem;
            background: rgba(15,23,42,0.5);
            border: none;
            border-top: 1px solid #0f172a;
            color: #475569;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .expand-btn:hover { color: #94a3b8; background: rgba(15,23,42,0.8); }

        .roster-detail {
            border-top: 1px solid #0f172a;
            padding: 1rem 1.25rem;
            background: rgba(10,16,30,0.6);
        }

        .roster-detail.hidden { display: none; }

        .pos-group { margin-bottom: 0.75rem; }
        .pos-label { font-size: 0.72rem; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; font-weight: 600; }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(15,23,42,0.5);
            font-size: 0.82rem;
        }

        .player-row:last-child { border-bottom: none; }
        .player-row-name { color: #e2e8f0; }
        .player-row-meta { color: #475569; font-size: 0.75rem; }
        .player-row-rank { color: #94a3b8; font-size: 0.78rem; }

        /* ── STATES ── */
        .loading-container { text-align: center; padding: 3rem; color: #64748b; }
        .error-container { padding: 1rem 1.25rem; background: rgba(127,29,29,0.25); border: 1px solid rgba(239,68,68,0.3); border-radius: 0.5rem; color: #fca5a5; font-size: 0.9rem; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #334155;
        }

        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state-text { font-size: 1rem; color: #475569; }

        /* ── LEAGUE INFO BAR ── */
        .league-info-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem 1.25rem;
            background: rgba(30,41,59,0.7);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            flex-wrap: wrap;
        }

        .league-info-name { font-size: 1.1rem; font-weight: 700; color: white; }
        .league-info-meta { font-size: 0.825rem; color: #64748b; }
        .league-info-scoring { font-size: 0.825rem; color: #fbbf24; margin-left: auto; }

        @media (max-width: 640px) {
            .main-content { padding: 1.5rem 1rem; }
            .league-picker { flex-direction: column; }
            .load-btn { width: 100%; }
            .teams-grid { grid-template-columns: 1fr; }
            .nav-version { display: none; }
        }
    </style>
</head>
<body>

    <!-- ── GLOBAL NAV ── -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">🏆 Sleeper Manager</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span>👤</span> My Rosters
                </a>
                <a href="league.html" class="nav-link active">
                    <span>🏟️</span> League View
                </a>
                <a href="profile.html" class="nav-link">
                    <span>🔍</span> Manager Profiles
                </a>
            </div>
            <span class="nav-version">v1.9.16-beta</span>
        </div>
    </nav>

    <div class="header-section">
        <div class="header-content">
            <h1>League View</h1>
            <p class="header-subtitle">All 12 teams — rosters, grades &amp; competitive standing</p>
        </div>
    </div>

    <div class="main-content">
        <div class="league-picker">
            <input type="text" id="leagueIdInput" class="league-input" placeholder="Paste a League ID..." value="1313956225737580544" />
            <button class="load-btn" id="loadBtn" onclick="loadLeague()">Load League</button>
        </div>

        <div id="content">
            <div class="empty-state">
                <div class="empty-state-icon">🏟️</div>
                <div class="empty-state-text">Enter a League ID above to load all teams</div>
            </div>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const leagueIdInput = document.getElementById('leagueIdInput');
        const loadBtn = document.getElementById('loadBtn');

        let playerLookupCache = {};

        // Auto-fill from URL param or default to CC
        const urlParams = new URLSearchParams(window.location.search);
        const urlLeagueId = urlParams.get('id');
        if (urlLeagueId) {
            leagueIdInput.value = urlLeagueId;
        }
        window.addEventListener('load', () => loadLeague());

        async function loadPlayerLookup() {
            if (Object.keys(playerLookupCache).length > 0) return;
            try {
                const response = await fetch('players.json');
                if (!response.ok) throw new Error('players.json not found');
                const data = await response.json();
                const players = data.players || data;
                players.forEach(row => {
                    const sleeperId = String(row['SLEEPER_ID']);
                    playerLookupCache[sleeperId] = {
                        playerName: row['PLAYER_NAME'], position: row['POSITION'],
                        age: parseInt(row['AGE']) || 0, team: row['TEAM'],
                        depthChartPos: row['DEPTH_CHART_POS'],
                        depthChartOrder: parseInt(row['DEPTH_CHART_ORDER']) || 0,
                        yearsExp: parseInt(row['YEARS_EXP']) || 0,
                        posRank: row['POS_RANK'],
                        defaultRank: parseInt(row['Default_Rank']) || 9999
                    };
                });
            } catch (e) { console.log('Could not load players.json:', e); }
        }

        const defenseMap = {
            'ARZ':'Arizona Cardinals Defense','ATL':'Atlanta Falcons Defense','BAL':'Baltimore Ravens Defense',
            'BUF':'Buffalo Bills Defense','CAR':'Carolina Panthers Defense','CHI':'Chicago Bears Defense',
            'CIN':'Cincinnati Bengals Defense','CLE':'Cleveland Browns Defense','DAL':'Dallas Cowboys Defense',
            'DEN':'Denver Broncos Defense','DET':'Detroit Lions Defense','GB':'Green Bay Packers Defense',
            'HOU':'Houston Texans Defense','IND':'Indianapolis Colts Defense','JAX':'Jacksonville Jaguars Defense',
            'KC':'Kansas City Chiefs Defense','LAC':'Los Angeles Chargers Defense','LAR':'Los Angeles Rams Defense',
            'LV':'Las Vegas Raiders Defense','MIA':'Miami Dolphins Defense','MIN':'Minnesota Vikings Defense',
            'NE':'New England Patriots Defense','NO':'New Orleans Saints Defense','NYG':'New York Giants Defense',
            'NYJ':'New York Jets Defense','PHI':'Philadelphia Eagles Defense','PIT':'Pittsburgh Steelers Defense',
            'SF':'San Francisco 49ers Defense','SEA':'Seattle Seahawks Defense','TB':'Tampa Bay Buccaneers Defense',
            'TEN':'Tennessee Titans Defense','WAS':'Washington Commanders Defense'
        };

        function getPlayerData(sleeperId) {
            const s = String(sleeperId);
            if (playerLookupCache[s]) return playerLookupCache[s];
            if (defenseMap[s]) return { playerName: defenseMap[s], position: 'DEF', age: 'N/A', team: s, depthChartPos: 'DEF', depthChartOrder: 1, yearsExp: 0, posRank: 'DEF_001', defaultRank: 9999 };
            return { playerName: `Unknown (${s})`, position: 'UNK', age: 'N/A', team: 'N/A', depthChartPos: 'N/A', depthChartOrder: 0, yearsExp: 0, posRank: 'UNK_000', defaultRank: 9999 };
        }

        function dynastyGrade(roster) {
            if (!roster.players || roster.players.length === 0) {
                return { label: 'Oblivious', totalScore: 0, t1: 0, t2: 0, t3: 0, t4: 0 };
            }
            let totalScore = 0, t1 = 0, t2 = 0, t3 = 0, t4 = 0;
            roster.players.forEach(id => {
                const p = getPlayerData(id);
                if (!p || ['DEF','K','UNK'].includes(p.position)) return;
                const s = scorePlayer(p);
                totalScore += s;
                if (s >= 85) t1++;
                else if (s >= 60) t2++;
                else if (s >= 35) t3++;
                else if (s > 0) t4++;
            });
            totalScore = Math.round(totalScore);
            return { totalScore, t1, t2, t3, t4 };
        }

        function getScoringLabel(league) {
            const s = league.scoring_settings || {};
            const parts = [];
            if (league.roster_positions?.includes('SUPER_FLEX')) parts.push('SF');
            const rec = s.rec;
            if (rec === 1) parts.push('PPR');
            else if (rec === 0.5) parts.push('HPPR');
            else if (rec === 0) parts.push('STD');
            else parts.push('PPR');
            if (s.bonus_rec_te > 0) parts.push(`${rec + s.bonus_rec_te}TEP`);
            if (league.settings?.best_ball === 1) parts.push('Best Ball');
            return parts.join(' ');
        }

        async function loadLeague() {
            const leagueId = leagueIdInput.value.trim();
            if (!leagueId) return;

            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            contentDiv.innerHTML = '<div class="loading-container">⏳ Loading league data...</div>';

            try {
                await loadPlayerLookup();

                const [leagueRes, rostersRes, usersRes, tradedPicksRes] = await Promise.all([
                    fetch(`https://api.sleeper.app/v1/league/${leagueId}`),
                    fetch(`https://api.sleeper.app/v1/league/${leagueId}/rosters`),
                    fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`),
                    fetch(`https://api.sleeper.app/v1/league/${leagueId}/traded_picks`)
                ]);

                if (!leagueRes.ok) throw new Error('League not found. Check the ID and try again.');
                const league = await leagueRes.json();
                const rosters = await rostersRes.json();
                const users = await usersRes.json();
                const tradedPicks = await tradedPicksRes.json();

                const userMap = {};
                users.forEach(u => { userMap[u.user_id] = u; });
                const rosterMap = {};
                rosters.forEach(r => { rosterMap[r.roster_id] = r; });

                renderLeague(league, rosters, userMap, tradedPicks, rosterMap);
            } catch (err) {
                contentDiv.innerHTML = `<div class="error-container">⚠️ ${err.message}</div>`;
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Load League';
            }
        }



        // ── PLAYER SCORING ENGINE ──
        function getPosRankNum(posRank) {
            if (!posRank) return 9999;
            const str = String(posRank);
            const parts = str.split('_');
            return parseInt(parts[parts.length - 1]) || 9999;
        }

        function getWRBaseScore(rank) {
            if (rank <= 12) return 99 - ((rank - 1) * (4/11));
            if (rank <= 18) return 94 - ((rank - 13) * (4/5));
            if (rank <= 24) return 88 - ((rank - 19) * (4/5));
            if (rank <= 36) return 82 - ((rank - 25) * (6/11));
            if (rank <= 48) return 75 - ((rank - 37) * (7/11));
            if (rank <= 60) return 67 - ((rank - 49) * (7/11));
            if (rank <= 78) return 50 - ((rank - 61) * (15/17));
            if (rank <= 125) return 32 - ((rank - 79) * (20/46));
            return 0;
        }

        function getWRExpDepthModifier(exp, depth) {
            const d = depth >= 4 ? 4 : depth;
            const matrix = {
                0: [1.00, 1.00, 0.90, 0.50],
                1: [1.05, 1.00, 0.95, 0.60],
                2: [1.00, 0.95, 0.75, 0.40],
                3: [0.85, 0.80, 0.60, 0.20]
            };
            let tier;
            if (exp === 0) tier = 0;
            else if (exp <= 3) tier = 1;
            else if (exp <= 7) tier = 2;
            else tier = 3;
            return matrix[tier][d - 1] || 0.20;
        }

        function getRBBaseScore(rank) {
            if (rank <= 6)   return 99 - ((rank - 1) * (4/5));
            if (rank <= 12)  return 94 - ((rank - 7) * (6/5));
            if (rank <= 24)  return 87 - ((rank - 13) * (9/11));
            if (rank <= 36)  return 77 - ((rank - 25) * (9/11));
            if (rank <= 48)  return 67 - ((rank - 37) * (12/11));
            if (rank <= 60)  return 54 - ((rank - 49) * (12/11));
            if (rank <= 85)  return 38 - ((rank - 61) * (20/24));
            if (rank <= 101) return 15 - ((rank - 86) * (10/15));
            return 0;
        }

        function getRBExpDepthModifier(exp, depth) {
            const d = depth >= 4 ? 4 : depth;
            const matrix = {
                0: [1.00, 1.00, 0.90, 0.40],
                1: [1.05, 1.00, 0.90, 0.50],
                2: [1.00, 0.90, 0.75, 0.25],
                3: [0.85, 0.70, 0.40, 0.10],
                4: [0.75, 0.40, 0.15, 0.05]
            };
            let tier;
            if (exp === 0) tier = 0;
            else if (exp <= 3) tier = 1;
            else if (exp <= 6) tier = 2;
            else if (exp <= 8) tier = 3;
            else tier = 4;
            return matrix[tier][d - 1] || 0.05;
        }

        function cleanDepth(depth, exp, position) {
            if (depth === 0 || depth === null || isNaN(depth)) return exp === 0 ? 3 : 4;
            if (depth >= 5) return 4;
            return depth;
        }


        function getTEBaseScore(rank) {
            if (rank <= 6)   return 99 - ((rank - 1) * (4/5));
            if (rank <= 12)  return 94 - ((rank - 7) * (6/5));
            if (rank <= 24)  return 87 - ((rank - 13) * (15/11));
            if (rank <= 36)  return 68 - ((rank - 25) * (18/11));
            if (rank <= 48)  return 45 - ((rank - 37) * (20/11));
            return 0;
        }

        function getTEExpDepthModifier(exp, depth) {
            const d = depth >= 4 ? 4 : depth;
            const matrix = {
                0: [1.00, 0.90, 0.60, 0.20],
                1: [1.05, 0.85, 0.55, 0.15],
                2: [1.00, 0.80, 0.45, 0.10],
                3: [0.80, 0.50, 0.20, 0.05]
            };
            let tier;
            if (exp === 0) tier = 0;
            else if (exp <= 3) tier = 1;
            else if (exp <= 9) tier = 2;
            else tier = 3;
            return matrix[tier][d - 1] || 0.05;
        }

        function getQBBaseScore(rank) {
            if (rank === 1)  return 99;
            if (rank <= 12)  return Math.round(99 - ((rank - 1) * (14/11)));
            if (rank <= 18)  return Math.round(85 - ((rank - 12) * (5/6)));
            if (rank <= 24)  return Math.round(80 - ((rank - 18) * (10/6)));
            if (rank <= 36)  return Math.round(70 - ((rank - 24) * (10/12)));
            if (rank <= 64)  return Math.round(60 - ((rank - 36) * (55/28)));
            return 0;
        }

        function getQBExpDepthModifier(exp, depth) {
            const d = depth >= 4 ? 4 : depth;
            const matrix = {
                0: [1.00, 0.95, 0.50, 0.20],
                1: [1.02, 0.90, 0.40, 0.15],
                2: [1.00, 0.80, 0.30, 0.10],
                3: [0.97, 0.60, 0.20, 0.05],
                4: [0.85, 0.30, 0.10, 0.02]
            };
            let tier;
            if (exp === 0) tier = 0;
            else if (exp <= 3) tier = 1;
            else if (exp <= 7) tier = 2;
            else if (exp <= 12) tier = 3;
            else tier = 4;
            return matrix[tier][d - 1] || 0.02;
        }


        function scorePlayer(playerData) {
            if (!playerData) return 0;
            const position = playerData.position;
            const posRank = getPosRankNum(playerData.posRank);
            const exp = playerData.yearsExp || 0;
            const rawDepth = playerData.depthChartOrder || 0;
            const depth = cleanDepth(rawDepth, exp, position);

            let base = 0;
            let modifier = 1.0;

            if (position === 'WR') {
                base = getWRBaseScore(posRank);
                modifier = getWRExpDepthModifier(exp, depth);
            } else if (position === 'RB') {
                base = getRBBaseScore(posRank);
                modifier = getRBExpDepthModifier(exp, depth);
            } else if (position === 'TE') {
                base = getTEBaseScore(posRank);
                modifier = getTEExpDepthModifier(exp, depth);
            } else if (position === 'QB') {
                base = getQBBaseScore(posRank);
                modifier = getQBExpDepthModifier(exp, depth);
            } else {
                return 0;
            }

            const score = Math.round(base * modifier);
            return Math.min(99, Math.max(0, score));
        }


        function buildPickInventory(myRosterId, tradedPicks, rosterMap, totalTeams) {
            const years = ['2026','2027','2028'];
            const rounds = [1,2,3,4];
            const owned = {};
            for (let i = 1; i <= totalTeams; i++) {
                owned[i] = [];
                years.forEach(y => rounds.forEach(r => { owned[i].push({season:y, round:r, originalRosterId:i, pickSlot:null}); }));
            }
            tradedPicks.forEach(tp => {
                if (parseInt(tp.season) < 2026) return;
                const origId = tp.roster_id;
                const newOwner = tp.owner_id;
                Object.keys(owned).forEach(rid => {
                    owned[rid] = owned[rid].filter(p => !(p.season === tp.season && p.round === tp.round && p.originalRosterId === origId));
                });
                if (!owned[newOwner]) owned[newOwner] = [];
                owned[newOwner].push({season: tp.season, round: tp.round, originalRosterId: origId, pickSlot: tp.pick_no || null});
            });
            return owned[myRosterId] || [];
        }

        function getTeamShortName(rosterId, rosterMap, userMap) {
            const roster = rosterMap[rosterId];
            if (!roster) return 'Team ' + rosterId;
            const user = userMap[roster.owner_id] || {};
            const n = (roster.metadata && roster.metadata.team_name) || (user.metadata && user.metadata.team_name) || user.display_name || ('Team ' + rosterId);
            return n.length > 14 ? n.split(' ')[0] : n;
        }

        function renderPickInventory(myRosterId, tradedPicks, rosterMap, userMap) {
            const total = Object.keys(rosterMap).length || 12;
            const picks = buildPickInventory(myRosterId, tradedPicks, rosterMap, total);
            const byYear = {'2026':[], '2027':[], '2028':[]};
            picks.forEach(p => { if (byYear[p.season]) byYear[p.season].push(p); });
            const rl = r => r===1?'1st':r===2?'2nd':r===3?'3rd':'4th';
            let html = '';
            ['2026','2027','2028'].forEach(yr => {
                const yp = byYear[yr];
                if (yp.length === 0) {
                    html += '<div style="margin-bottom:0.25rem"><span style="color:#fbbf24;font-weight:600">'+yr+':</span> <span style="color:#ef4444;font-size:0.75rem">No picks</span></div>';
                    return;
                }
                yp.sort((a,b) => a.round !== b.round ? a.round-b.round : (a.pickSlot||99)-(b.pickSlot||99));
                const parts = yp.map(p => {
                    const own = p.originalRosterId === myRosterId;
                    const lbl = (yr==='2026' && p.pickSlot) ? (p.round+'.'+String(p.pickSlot).padStart(2,'0')) : rl(p.round);
                    const sfx = own ? '' : ' <span style="color:#475569;font-size:0.72rem">('+getTeamShortName(p.originalRosterId, rosterMap, userMap)+')</span>';
                    const col = p.round===1?'#fbbf24':p.round===2?'#94a3b8':'#475569';
                    return '<span style="color:'+col+'">'+lbl+'</span>'+sfx;
                }).join(' <span style="color:#1e293b">&middot;</span> ');
                html += '<div style="margin-bottom:0.25rem;line-height:1.7;font-size:0.8rem"><span style="color:#fbbf24;font-weight:600">'+yr+':</span> '+parts+'</div>';
            });
            return html || '<span style="color:#475569;font-size:0.8rem">No future picks</span>';
        }

        function renderLeague(league, rosters, userMap, tradedPicks, rosterMap) {
            const scoring = getScoringLabel(league);
            let html = `<div class="league-info-bar">
                <div>
                    <div class="league-info-name">${league.name}</div>
                    <div class="league-info-meta">${league.total_rosters} teams · Season ${league.season}</div>
                </div>
                <div class="league-info-scoring">${scoring}</div>
            </div>`;

            // Grade all rosters and sort by score desc
            const gradedRosters = rosters.map(roster => {
                const user = userMap[roster.owner_id] || {};
                const grade = dynastyGrade(roster);
                return { roster, user, grade };
            }).sort((a,b) => b.grade.totalScore - a.grade.totalScore);

            html += `<div class="teams-grid">`;

            gradedRosters.forEach((item, idx) => {
                const { roster, user, grade } = item;
                const teamName = roster.metadata?.team_name || user.metadata?.team_name || user.display_name || `Team ${roster.roster_id}`;
                const managerName = user.display_name || 'Unknown';
                const wins = roster.settings?.wins || 0;
                const losses = roster.settings?.losses || 0;
                const pf = roster.settings?.fpts ? parseFloat(roster.settings.fpts).toFixed(1) : '—';



                // T1 players (dynasty score >= 85) sorted by score desc
                const allScoredPlayers = (roster.players || [])
                    .map(id => ({ id, data: getPlayerData(id), score: scorePlayer(getPlayerData(id)) }))
                    .filter(p => !['DEF','K','UNK'].includes(p.data.position));
                const t1Players = allScoredPlayers
                    .filter(p => p.score >= 85)
                    .sort((a,b) => b.score - a.score);

                html += `<div class="team-card" id="team-card-${idx}">
                    <div class="team-card-header">
                        <div style="display:flex;align-items:center;gap:0.75rem;flex:1;">`;

                if (user.avatar) {
                    html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" class="team-avatar" alt="${managerName}" />`;
                } else {
                    html += `<div class="team-avatar-placeholder">👤</div>`;
                }

                const username = user.display_name ? user.username || '' : '';
                html += `<div class="team-info">
                                <div class="team-name">${teamName}</div>
                                <div class="team-manager"><a href="profile.html?user=${user.username || ''}" style="color:#94a3b8;text-decoration:none;" onmouseover="this.style.color='#fbbf24'" onmouseout="this.style.color='#94a3b8'">@${managerName} →</a></div>
                                <div class="team-record">${wins}–${losses} · ${pf} pts</div>
                            </div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;">
                            <div style="font-size:1.5rem;font-weight:700;color:#fbbf24;">${grade.totalScore}</div>
                            <div style="font-size:0.72rem;color:#475569;margin-top:0.15rem;">dynasty pts</div>
                        </div>
                    </div>

                    <div style="padding:0.5rem 1.25rem 0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
                        ${grade.t1 > 0 ? `<span style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);padding:0.2rem 0.6rem;border-radius:99px;font-size:0.75rem;font-weight:600;">T1 ×${grade.t1}</span>` : ''}
                        ${grade.t2 > 0 ? `<span style="background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.25);padding:0.2rem 0.6rem;border-radius:99px;font-size:0.75rem;font-weight:600;">T2 ×${grade.t2}</span>` : ''}
                        ${grade.t3 > 0 ? `<span style="background:rgba(148,163,184,0.1);color:#94a3b8;border:1px solid rgba(148,163,184,0.2);padding:0.2rem 0.6rem;border-radius:99px;font-size:0.75rem;font-weight:600;">T3 ×${grade.t3}</span>` : ''}
                        ${grade.t4 > 0 ? `<span style="background:rgba(71,85,105,0.1);color:#64748b;border:1px solid rgba(71,85,105,0.2);padding:0.2rem 0.6rem;border-radius:99px;font-size:0.75rem;font-weight:600;">T4 ×${grade.t4}</span>` : ''}
                    </div>

                    <div class="team-top-players">
                        <div class="top-player-label">T1 players (${t1Players.length})</div>
                        ${t1Players.map(p => `<span class="top-player-pill" style="border-left:2px solid #fbbf24;">${p.data.playerName?.split(' ').pop() || '?'} <span style="color:#fbbf24;font-weight:600;">${p.score}</span></span>`).join('')}
                        ${t1Players.length === 0 ? '<span style="color:#475569;font-size:0.78rem;">No T1 players</span>' : ''}
                    </div>
                    <div style="padding:0 1.25rem 0.75rem;border-top:1px solid #0f172a;margin-top:0.5rem;padding-top:0.75rem;">
                        <div class="top-player-label" style="margin-bottom:0.5rem;">Draft picks</div>
                        ${renderPickInventory(roster.roster_id, tradedPicks, rosterMap, userMap)}
                    </div>

                    <button class="expand-btn" onclick="toggleRoster(${idx})">▼ Full roster</button>

                    <div class="roster-detail hidden" id="roster-detail-${idx}">
                        ${renderRosterDetail(roster)}
                    </div>
                </div>`;
            });

            html += `</div>`;
            contentDiv.innerHTML = html;
        }

        function scoreBar(label, value, color) {
            return `<div class="score-row">
                <span class="score-label">${label}</span>
                <div class="score-track"><div class="score-fill" style="width:${value}%;background:${color};"></div></div>
                <span class="score-val">${Math.round(value)}</span>
            </div>`;
        }

        function renderRosterDetail(roster) {
            if (!roster.players || roster.players.length === 0) return '<p style="color:#475569;font-size:0.82rem;">No players found.</p>';

            const byPos = {};
            roster.players.forEach(id => {
                const p = getPlayerData(id);
                const pos = p.position || 'UNK';
                if (!byPos[pos]) byPos[pos] = [];
                byPos[pos].push({ id, data: p });
            });

            const order = ['QB','RB','WR','TE','K','DEF','UNK'];
            let html = '';
            order.forEach(pos => {
                if (!byPos[pos]) return;
                html += `<div class="pos-group"><div class="pos-label">${pos}</div>`;
                byPos[pos].sort((a,b) => (a.data.defaultRank||9999)-(b.data.defaultRank||9999)).forEach(({id, data}) => {
                    const isIR = roster.reserve?.includes(id);
                    const isTaxi = roster.taxi?.includes(id);
                    const flag = isIR ? ' 💔' : isTaxi ? ' 🚕' : '';
                    const dynScore = scorePlayer(data);
                    const scoreCol = dynScore >= 85 ? '#fbbf24' : dynScore >= 60 ? '#34d399' : dynScore >= 35 ? '#94a3b8' : '#475569';
                    const scoreDisplay = dynScore > 0 ? dynScore : (data.defaultRank < 9999 ? 'OVR #' + data.defaultRank : '—');
                    html += `<div class="player-row">
                        <div>
                            <div class="player-row-name">${data.playerName || id}${flag}</div>
                            <div class="player-row-meta">${data.team || ''} · Age ${data.age || '?'}</div>
                        </div>
                        <div class="player-row-rank" style="color:${scoreCol}">${scoreDisplay}</div>
                    </div>`;
                });
                html += `</div>`;
            });
            return html;
        }

        function toggleRoster(idx) {
            const detail = document.getElementById(`roster-detail-${idx}`);
            const btn = detail.previousElementSibling;
            detail.classList.toggle('hidden');
            btn.textContent = detail.classList.contains('hidden') ? '▼ Full roster' : '▲ Hide roster';
        }
    </script>
</body>
</html>
