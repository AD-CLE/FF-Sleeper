<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleeper Manager - Manager Profiles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { background: rgba(10,16,30,0.95); border-bottom: 1px solid rgba(251,191,36,0.2); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 80rem; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; height: 56px; }
        .nav-brand { font-size: 1.1rem; font-weight: 700; color: #fbbf24; text-decoration: none; letter-spacing: -0.02em; margin-right: 2rem; flex-shrink: 0; }
        .nav-links { display: flex; align-items: center; gap: 0.25rem; flex: 1; }
        .nav-link { padding: 0.4rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; color: #94a3b8; text-decoration: none; transition: all 0.15s; display: flex; align-items: center; gap: 0.4rem; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-link.active { color: #fbbf24; background: rgba(251,191,36,0.1); }
        .nav-version { font-size: 0.7rem; color: #475569; font-family: monospace; margin-left: auto; }
        .header-section { border-bottom: 1px solid rgba(148,163,184,0.1); background: rgba(15,23,42,0.6); padding: 2rem 1.5rem; }
        .header-content { max-width: 80rem; margin: 0 auto; }
        .header-content h1 { font-size: 1.75rem; font-weight: 700; color: white; margin-bottom: 0.35rem; }
        .header-subtitle { color: #64748b; font-size: 0.9rem; }
        .main-content { max-width: 80rem; margin: 0 auto; padding: 2.5rem 1.5rem; }
        .search-bar { display: flex; gap: 0.75rem; margin-bottom: 2.5rem; }
        .search-input { flex: 1; padding: 0.75rem 1rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; color: white; font-size: 0.95rem; }
        .search-input:focus { outline: none; border-color: #fbbf24; }
        .search-input::placeholder { color: #475569; }
        .year-select { padding: 0.75rem 1rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; color: white; font-size: 0.95rem; }
        .search-btn { padding: 0.75rem 1.5rem; background: #fbbf24; color: #0f172a; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
        .search-btn:hover:not(:disabled) { background: #f59e0b; }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading-container { text-align: center; padding: 3rem; color: #64748b; }
        .error-container { padding: 1rem 1.25rem; background: rgba(127,29,29,0.25); border: 1px solid rgba(239,68,68,0.3); border-radius: 0.5rem; color: #fca5a5; font-size: 0.9rem; margin-bottom: 1rem; }
        .profile-header { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem; padding: 1.5rem; background: rgba(30,41,59,0.7); border: 1px solid #334155; border-radius: 0.75rem; }
        .profile-avatar { width: 4rem; height: 4rem; border-radius: 50%; border: 2px solid #fbbf24; object-fit: cover; flex-shrink: 0; }
        .profile-avatar-placeholder { width: 4rem; height: 4rem; border-radius: 50%; border: 2px solid #fbbf24; background: rgba(251,191,36,0.12); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
        .profile-name { font-size: 1.5rem; font-weight: 700; color: white; }
        .profile-meta { color: #64748b; font-size: 0.85rem; margin-top: 0.25rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(30,41,59,0.6); border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: #fbbf24; }
        .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .section-block { margin-bottom: 2rem; }
        .section-title { font-size: 1rem; font-weight: 700; color: white; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .insight-card { background: rgba(30,41,59,0.6); border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; }
        .tendency-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .tend-label { font-size: 0.8rem; color: #94a3b8; width: 3rem; flex-shrink: 0; font-weight: 600; }
        .tend-track { flex: 1; height: 8px; background: #0f172a; border-radius: 99px; overflow: hidden; }
        .tend-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
        .tend-val { font-size: 0.78rem; color: #94a3b8; width: 3.5rem; text-align: right; flex-shrink: 0; }
        .bias-pill { display: inline-block; padding: 0.25rem 0.75rem; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); border-radius: 99px; font-size: 0.78rem; color: #fbbf24; margin: 0.2rem; }
        .format-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
        .format-row:last-child { border-bottom: none; }
        .format-label { color: #94a3b8; }
        .format-val { color: white; font-weight: 600; }
        .format-insight { font-size: 0.75rem; color: #64748b; margin-top: 0.15rem; }
        .league-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .league-table th { text-align: left; color: #475569; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
        .league-table td { padding: 0.65rem 0.75rem; color: #cbd5e1; border-bottom: 1px solid #0f172a; }
        .league-table tr:last-child td { border-bottom: none; }
        .league-table tr:hover td { background: rgba(255,255,255,0.02); }
        .tier-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .tier-pill { padding: 0.1rem 0.4rem; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
        .tp-t1 { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .tp-t2 { background: rgba(52,211,153,0.12); color: #34d399; }
        .tp-t3 { background: rgba(148,163,184,0.1); color: #94a3b8; }
        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state-text { font-size: 1rem; color: #475569; }
        .format-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.35rem; }
        .fb-sf { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .fb-tep { background: rgba(167,139,250,0.15); color: #a78bfa; }
        .insight-flag { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.3rem 0.75rem; border-radius: 0.375rem; font-size: 0.78rem; font-weight: 600; margin: 0.2rem; }
        .flag-good { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
        .flag-warn { background: rgba(249,115,22,0.12); color: #f97316; border: 1px solid rgba(249,115,22,0.2); }
        .flag-neutral { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.15); }
        .league-selector { background: rgba(30,41,59,0.6); border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 2rem; }
        .league-selector-title { font-size: 0.85rem; font-weight: 700; color: white; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .league-check-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #0f172a; cursor: pointer; }
        .league-check-row:last-of-type { border-bottom: none; }
        .league-check-row:hover { background: rgba(255,255,255,0.02); border-radius: 4px; }
        .league-check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #fbbf24; flex-shrink: 0; }
        .league-check-name { font-size: 0.875rem; color: white; flex: 1; }
        .league-check-meta { font-size: 0.75rem; color: #475569; }
        .analyze-btn { width: 100%; margin-top: 1rem; padding: 0.75rem; background: #fbbf24; color: #0f172a; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
        .analyze-btn:hover { background: #f59e0b; }
        .toggle-all { font-size: 0.75rem; color: #64748b; cursor: pointer; text-decoration: underline; }
        .toggle-all:hover { color: #94a3b8; }
        @media (max-width: 640px) { .main-content { padding: 1.5rem 1rem; } .search-bar { flex-direction: column; } .search-btn, .year-select { width: 100%; } .nav-version { display: none; } }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">🏆 Sleeper Manager</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><span>👤</span> My Rosters</a>
                <a href="league.html" class="nav-link"><span>🏟️</span> League View</a>
                <a href="profile.html" class="nav-link active"><span>🔍</span> Manager Profiles</a>
            </div>
            <span class="nav-version">v1.9.20-beta</span>
        </div>
    </nav>

    <div class="header-section">
        <div class="header-content">
            <h1>Manager Profiles</h1>
            <p class="header-subtitle">Roster tendencies, format biases & trade intel across all leagues</p>
        </div>
    </div>

    <div class="main-content">
        <div class="search-bar">
            <input type="text" id="usernameInput" class="search-input" placeholder="Enter Sleeper username..." value="ankurdeora" />
            <select id="yearSelect" class="year-select">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
            <button class="search-btn" id="searchBtn" onclick="loadProfile()">Load Profile</button>
        </div>
        <div id="content">
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-text">Enter a Sleeper username to build their manager profile</div>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script>
        const contentDiv = document.getElementById('content');
        const usernameInput = document.getElementById('usernameInput');
        const yearSelect = document.getElementById('yearSelect');
        const searchBtn = document.getElementById('searchBtn');

        function getScoringInfo(league) {
            const s = league.scoring_settings || {};
            const hasSF = league.roster_positions?.includes('SUPER_FLEX');
            const bonusTE = parseFloat(s.bonus_rec_te) || 0;
            const hasTEP = bonusTE > 0;
            const rec = s.rec;
            const parts = [];
            if (hasSF) parts.push('SF');
            if (rec === 1) parts.push('PPR');
            else if (rec === 0.5) parts.push('HPPR');
            else parts.push('STD');
            if (hasTEP) parts.push(`${rec + bonusTE}TEP`);
            return { label: parts.join(' '), hasSF, hasTEP, bonusTE };
        }

        function analyzeLeague(league, roster) {
            if (!roster || !roster.players) return null;
            const scoring = getScoringInfo(league);
            const players = roster.players.map(id => ({ id, data: getPlayerData(id), score: scorePlayer(getPlayerData(id)) }));
            const skillPlayers = players.filter(p => ['QB','RB','WR','TE'].includes(p.data.position));

            const totalScore = skillPlayers.reduce((s,p) => s+p.score, 0);
            const t1 = skillPlayers.filter(p => p.score >= 90).length;
            const t2 = skillPlayers.filter(p => p.score >= 60 && p.score < 90).length;
            const t3 = skillPlayers.filter(p => p.score >= 35 && p.score < 60).length;
            const t4 = skillPlayers.filter(p => p.score > 0 && p.score < 35).length;

            // Score by position
            const posTotals = { QB: 0, RB: 0, WR: 0, TE: 0 };
            skillPlayers.forEach(p => { if (posTotals[p.data.position] !== undefined) posTotals[p.data.position] += p.score; });

            // Count by position
            const posCounts = { QB: 0, RB: 0, WR: 0, TE: 0 };
            skillPlayers.forEach(p => { if (posCounts[p.data.position] !== undefined) posCounts[p.data.position]++; });

            // Team counts
            const teamCounts = {};
            skillPlayers.forEach(p => {
                const team = p.data.team;
                if (team && team !== 'N/A' && team !== 'FA') teamCounts[team] = (teamCounts[team] || 0) + 1;
            });

            // Avg age
            const agePlayers = skillPlayers.filter(p => p.data.age > 0);
            const avgAge = agePlayers.length > 0 ? (agePlayers.reduce((s,p) => s + p.data.age, 0) / agePlayers.length) : 0;

            return { league, scoring, totalScore, t1, t2, t3, t4, posTotals, posCounts, teamCounts, avgAge, playerCount: skillPlayers.length };
        }

        let allLeagueData = [];
        let currentUser = null;

        async function loadProfile() {
            const username = usernameInput.value.trim();
            const year = yearSelect.value;
            if (!username) return;

            searchBtn.disabled = true;
            searchBtn.textContent = 'Loading...';
            contentDiv.innerHTML = '<div class="loading-container">⏳ Building manager profile...</div>';

            try {
                await loadPlayerLookup();

                const userRes = await fetch(`https://api.sleeper.app/v1/user/${username}`);
                if (!userRes.ok) throw new Error('Username not found');
                const user = await userRes.json();

                const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year}`);
                const leagues = await leaguesRes.json();
                if (!leagues || leagues.length === 0) throw new Error(`No leagues found for ${username} in ${year}`);

                contentDiv.innerHTML = '<div class="loading-container">⏳ Fetching rosters across ' + leagues.length + ' leagues...</div>';

                const leagueData = await Promise.all(leagues.map(async (league) => {
                    try {
                        const rostersRes = await fetch(`https://api.sleeper.app/v1/league/${league.league_id}/rosters`);
                        const rosters = await rostersRes.json();
                        const myRoster = rosters.find(r => r.owner_id === user.user_id);
                        return analyzeLeague(league, myRoster);
                    } catch { return null; }
                }));

                const validData = leagueData.filter(d => d !== null);
                allLeagueData = validData;
                currentUser = user;
                showLeagueSelector(user, validData, year);

            } catch (err) {
                contentDiv.innerHTML = `<div class="error-container">⚠️ ${err.message}</div>`;
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Load Profile';
            }
        }

        function showLeagueSelector(user, leagueData, year) {
            let html = '';

            // Profile header
            html += `<div class="profile-header">`;
            if (user.avatar) html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" class="profile-avatar" alt="${user.display_name}" />`;
            else html += `<div class="profile-avatar-placeholder">👤</div>`;
            html += `<div><div class="profile-name">${user.display_name}</div><div class="profile-meta">@${user.username} · ${leagueData.length} league${leagueData.length !== 1 ? 's' : ''} in ${year}</div></div></div>`;

            // League selector
            html += `<div class="league-selector">
                <div class="league-selector-title">
                    <span>🏆 Select Leagues to Analyze (${leagueData.length})</span>
                    <span class="toggle-all" onclick="toggleAll()">Toggle all</span>
                </div>`;

            leagueData.forEach((d, idx) => {
                const sfBadge = d.scoring.hasSF ? '<span style="background:rgba(96,165,250,0.15);color:#60a5fa;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.68rem;font-weight:600;margin-left:0.3rem;">SF</span>' : '';
                const tepBadge = d.scoring.hasTEP ? '<span style="background:rgba(167,139,250,0.15);color:#a78bfa;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.68rem;font-weight:600;margin-left:0.3rem;">TEP</span>' : '';
                html += `<label class="league-check-row">
                    <input type="checkbox" id="league-cb-${idx}" checked />
                    <div style="flex:1;">
                        <div class="league-check-name">${d.league.name}${sfBadge}${tepBadge}</div>
                        <div class="league-check-meta">${d.league.total_rosters} teams · ${d.scoring.label} · Score: ${d.totalScore}</div>
                    </div>
                </label>`;
            });

            html += `<button class="analyze-btn" onclick="analyzeSelected()">Analyze Selected Leagues →</button>
            </div>`;

            contentDiv.innerHTML = html;
        }

        function toggleAll() {
            const checkboxes = document.querySelectorAll('[id^="league-cb-"]');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => { cb.checked = !allChecked; });
        }

        function analyzeSelected() {
            const checkboxes = document.querySelectorAll('[id^="league-cb-"]');
            const selected = [];
            checkboxes.forEach((cb, idx) => { if (cb.checked) selected.push(allLeagueData[idx]); });
            if (selected.length === 0) { alert('Please select at least one league.'); return; }
            const year = yearSelect.value;
            renderProfile(currentUser, selected, year);
        }

        function renderProfile(user, leagueData, year) {
            if (leagueData.length === 0) { contentDiv.innerHTML = '<div class="error-container">No league data found.</div>'; return; }

            // ── AGGREGATE ──
            const totalLeagues = leagueData.length;
            const sfLeagues = leagueData.filter(d => d.scoring.hasSF);
            const tepLeagues = leagueData.filter(d => d.scoring.hasTEP);
            const nonSFLeagues = leagueData.filter(d => !d.scoring.hasSF);
            const nonTEPLeagues = leagueData.filter(d => !d.scoring.hasTEP);

            const avgDynastyScore = Math.round(leagueData.reduce((s,d) => s + d.totalScore, 0) / totalLeagues);
            const avgAge = (leagueData.reduce((s,d) => s + d.avgAge, 0) / totalLeagues).toFixed(1);
            const avgT1 = (leagueData.reduce((s,d) => s + d.t1, 0) / totalLeagues).toFixed(1);

            // Aggregate position score %
            const allPosTotals = { QB: 0, RB: 0, WR: 0, TE: 0 };
            leagueData.forEach(d => { Object.keys(allPosTotals).forEach(pos => { allPosTotals[pos] += d.posTotals[pos]; }); });
            const grandTotal = Object.values(allPosTotals).reduce((s,v) => s+v, 0) || 1;
            const posPct = {};
            Object.keys(allPosTotals).forEach(pos => { posPct[pos] = Math.round((allPosTotals[pos] / grandTotal) * 100); });

            // SF QB tendency
            const sfQBPct = sfLeagues.length > 0 ? Math.round(sfLeagues.reduce((s,d) => s + (d.posTotals.QB / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / sfLeagues.length * 100) : null;
            const nonSFQBPct = nonSFLeagues.length > 0 ? Math.round(nonSFLeagues.reduce((s,d) => s + (d.posTotals.QB / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / nonSFLeagues.length * 100) : null;

            // TEP TE tendency
            const tepTEPct = tepLeagues.length > 0 ? Math.round(tepLeagues.reduce((s,d) => s + (d.posTotals.TE / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / tepLeagues.length * 100) : null;
            const nonTEPTEPct = nonTEPLeagues.length > 0 ? Math.round(nonTEPLeagues.reduce((s,d) => s + (d.posTotals.TE / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / nonTEPLeagues.length * 100) : null;

            // Avg TE count SF vs non-SF
            const sfTEAvg = sfLeagues.length > 0 ? (sfLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / sfLeagues.length).toFixed(1) : null;
            const nonSFTEAvg = nonSFLeagues.length > 0 ? (nonSFLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / nonSFLeagues.length).toFixed(1) : null;
            const tepTEAvg = tepLeagues.length > 0 ? (tepLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / tepLeagues.length).toFixed(1) : null;
            const nonTEPTEAvg = nonTEPLeagues.length > 0 ? (nonTEPLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / nonTEPLeagues.length).toFixed(1) : null;
            const sfQBAvg = sfLeagues.length > 0 ? (sfLeagues.reduce((s,d) => s + d.posCounts.QB, 0) / sfLeagues.length).toFixed(1) : null;
            const nonSFQBAvg = nonSFLeagues.length > 0 ? (nonSFLeagues.reduce((s,d) => s + d.posCounts.QB, 0) / nonSFLeagues.length).toFixed(1) : null;

            // NFL team biases across all leagues
            const allTeamCounts = {};
            leagueData.forEach(d => { Object.entries(d.teamCounts).forEach(([team, count]) => { allTeamCounts[team] = (allTeamCounts[team] || 0) + count; }); });
            const teamBiases = Object.entries(allTeamCounts).filter(([,v]) => v >= 3).sort((a,b) => b[1]-a[1]).slice(0, 10);

            // Tier distribution across all leagues
            const totalT1 = leagueData.reduce((s,d) => s + d.t1, 0);
            const totalT2 = leagueData.reduce((s,d) => s + d.t2, 0);
            const totalT3 = leagueData.reduce((s,d) => s + d.t3, 0);
            const totalT4 = leagueData.reduce((s,d) => s + d.t4, 0);
            const totalTiers = totalT1 + totalT2 + totalT3 + totalT4 || 1;
            const tierPct = {
                T1: Math.round((totalT1 / totalTiers) * 100),
                T2: Math.round((totalT2 / totalTiers) * 100),
                T3: Math.round((totalT3 / totalTiers) * 100),
                T4: Math.round((totalT4 / totalTiers) * 100)
            };

            // ── RENDER ──
            let html = '';

            // Profile header
            html += `<div style="margin-bottom:1rem;"><button onclick="showLeagueSelector(currentUser, allLeagueData, '${year}')" style="background:transparent;border:1px solid #334155;color:#94a3b8;padding:0.4rem 0.875rem;border-radius:0.375rem;cursor:pointer;font-size:0.825rem;">← Back to league selection</button></div>`;
            html += `<div class="profile-header">`;
            if (user.avatar) html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" class="profile-avatar" alt="${user.display_name}" />`;
            else html += `<div class="profile-avatar-placeholder">👤</div>`;

            html += `</div></div>`;

        }

        function toggleAll() {
            const checkboxes = document.querySelectorAll('[id^="league-cb-"]');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => { cb.checked = !allChecked; });
        }

        function analyzeSelected() {
            const checkboxes = document.querySelectorAll('[id^="league-cb-"]');
            const selected = [];
            checkboxes.forEach((cb, idx) => { if (cb.checked) selected.push(allLeagueData[idx]); });
            if (selected.length === 0) { alert('Please select at least one league.'); return; }
            const year = yearSelect.value;
            renderProfile(currentUser, selected, year);
        }

        function renderProfile(user, leagueData, year) {
            if (leagueData.length === 0) { contentDiv.innerHTML = '<div class="error-container">No league data found.</div>'; return; }

            // ── AGGREGATE ──
            const totalLeagues = leagueData.length;
            const sfLeagues = leagueData.filter(d => d.scoring.hasSF);
            const tepLeagues = leagueData.filter(d => d.scoring.hasTEP);
            const nonSFLeagues = leagueData.filter(d => !d.scoring.hasSF);
            const nonTEPLeagues = leagueData.filter(d => !d.scoring.hasTEP);

            const avgDynastyScore = Math.round(leagueData.reduce((s,d) => s + d.totalScore, 0) / totalLeagues);
            const avgAge = (leagueData.reduce((s,d) => s + d.avgAge, 0) / totalLeagues).toFixed(1);
            const avgT1 = (leagueData.reduce((s,d) => s + d.t1, 0) / totalLeagues).toFixed(1);

            // Aggregate position score %
            const allPosTotals = { QB: 0, RB: 0, WR: 0, TE: 0 };
            leagueData.forEach(d => { Object.keys(allPosTotals).forEach(pos => { allPosTotals[pos] += d.posTotals[pos]; }); });
            const grandTotal = Object.values(allPosTotals).reduce((s,v) => s+v, 0) || 1;
            const posPct = {};
            Object.keys(allPosTotals).forEach(pos => { posPct[pos] = Math.round((allPosTotals[pos] / grandTotal) * 100); });

            // SF QB tendency
            const sfQBPct = sfLeagues.length > 0 ? Math.round(sfLeagues.reduce((s,d) => s + (d.posTotals.QB / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / sfLeagues.length * 100) : null;
            const nonSFQBPct = nonSFLeagues.length > 0 ? Math.round(nonSFLeagues.reduce((s,d) => s + (d.posTotals.QB / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / nonSFLeagues.length * 100) : null;

            // TEP TE tendency
            const tepTEPct = tepLeagues.length > 0 ? Math.round(tepLeagues.reduce((s,d) => s + (d.posTotals.TE / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / tepLeagues.length * 100) : null;
            const nonTEPTEPct = nonTEPLeagues.length > 0 ? Math.round(nonTEPLeagues.reduce((s,d) => s + (d.posTotals.TE / (Object.values(d.posTotals).reduce((a,b)=>a+b,1))), 0) / nonTEPLeagues.length * 100) : null;

            // Avg TE count SF vs non-SF
            const sfTEAvg = sfLeagues.length > 0 ? (sfLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / sfLeagues.length).toFixed(1) : null;
            const nonSFTEAvg = nonSFLeagues.length > 0 ? (nonSFLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / nonSFLeagues.length).toFixed(1) : null;
            const tepTEAvg = tepLeagues.length > 0 ? (tepLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / tepLeagues.length).toFixed(1) : null;
            const nonTEPTEAvg = nonTEPLeagues.length > 0 ? (nonTEPLeagues.reduce((s,d) => s + d.posCounts.TE, 0) / nonTEPLeagues.length).toFixed(1) : null;
            const sfQBAvg = sfLeagues.length > 0 ? (sfLeagues.reduce((s,d) => s + d.posCounts.QB, 0) / sfLeagues.length).toFixed(1) : null;
            const nonSFQBAvg = nonSFLeagues.length > 0 ? (nonSFLeagues.reduce((s,d) => s + d.posCounts.QB, 0) / nonSFLeagues.length).toFixed(1) : null;

            // NFL team biases across all leagues
            const allTeamCounts = {};
            leagueData.forEach(d => { Object.entries(d.teamCounts).forEach(([team, count]) => { allTeamCounts[team] = (allTeamCounts[team] || 0) + count; }); });
            const teamBiases = Object.entries(allTeamCounts).filter(([,v]) => v >= 3).sort((a,b) => b[1]-a[1]).slice(0, 10);

            // Tier distribution across all leagues
            const totalT1 = leagueData.reduce((s,d) => s + d.t1, 0);
            const totalT2 = leagueData.reduce((s,d) => s + d.t2, 0);
            const totalT3 = leagueData.reduce((s,d) => s + d.t3, 0);
            const totalT4 = leagueData.reduce((s,d) => s + d.t4, 0);
            const totalTiers = totalT1 + totalT2 + totalT3 + totalT4 || 1;
            const tierPct = {
                T1: Math.round((totalT1 / totalTiers) * 100),
                T2: Math.round((totalT2 / totalTiers) * 100),
                T3: Math.round((totalT3 / totalTiers) * 100),
                T4: Math.round((totalT4 / totalTiers) * 100)
            };

            // ── RENDER ──
            let html = '';

            // Profile header
            html += `<div style="margin-bottom:1rem;"><button onclick="showLeagueSelector(currentUser, allLeagueData, '${year}')" style="background:transparent;border:1px solid #334155;color:#94a3b8;padding:0.4rem 0.875rem;border-radius:0.375rem;cursor:pointer;font-size:0.825rem;">← Back to league selection</button></div>`;
            html += `<div class="profile-header">`;
            if (user.avatar) html += `<img src="https://sleepercdn.com/avatars/thumbs/${user.avatar}" class="profile-avatar" alt="${user.display_name}" />`;
            else html += `<div class="profile-avatar-placeholder">👤</div>`;
            html += `<div><div class="profile-name">${user.display_name}</div><div class="profile-meta">@${user.username} · Analyzing ${totalLeagues} of ${allLeagueData.length} league${allLeagueData.length !== 1 ? 's' : ''} in ${year} · ${sfLeagues.length} SF · ${tepLeagues.length} TEP</div></div></div>`;

            // Summary stats
            html += `<div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${avgDynastyScore}</div><div class="stat-label">Avg Dynasty Score</div></div>
                <div class="stat-card"><div class="stat-value">${avgT1}</div><div class="stat-label">Avg T1 Players</div></div>
                <div class="stat-card"><div class="stat-value">${avgAge}</div><div class="stat-label">Avg Roster Age</div></div>
                <div class="stat-card"><div class="stat-value">${totalLeagues}</div><div class="stat-label">Total Leagues</div></div>
            </div>`;

            // Position value distribution - side by side
            html += `<div class="section-block">
                <div class="section-title">📊 Roster Profile</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="insight-card">
                        <div style="font-size:0.72rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.75rem;">By Position (% of score)</div>
                        ${tendBar('QB', posPct.QB, '#60a5fa')}
                        ${tendBar('RB', posPct.RB, '#34d399')}
                        ${tendBar('WR', posPct.WR, '#fbbf24')}
                        ${tendBar('TE', posPct.TE, '#a78bfa')}
                    </div>
                    <div class="insight-card">
                        <div style="font-size:0.72rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.75rem;">By Tier (% of players)</div>
                        ${tendBar('T1', tierPct.T1, '#fbbf24')}
                        ${tendBar('T2', tierPct.T2, '#34d399')}
                        ${tendBar('T3', tierPct.T3, '#94a3b8')}
                        ${tendBar('T4', tierPct.T4, '#64748b')}
                    </div>
                </div>
                <div style="font-size:0.72rem;color:#334155;margin-top:0.5rem;">Aggregated across ${totalLeagues} selected leagues · T1=90+ · T2=60-89 · T3=35-59 · T4=1-34</div>
            </div>`;

            // Format tendencies
            html += `<div class="section-block"><div class="section-title">🏈 Format Tendencies</div><div class="insight-card">`;

            // QB in SF vs 1QB
            if (sfLeagues.length > 0 && nonSFLeagues.length > 0) {
                const qbDiff = sfQBAvg - nonSFQBAvg;
                const qbInsight = qbDiff >= 1.5 ? 'Correctly loads up QBs in SF' : qbDiff >= 0.5 ? 'Slightly QB heavy in SF' : 'Does not adjust QB count for SF format';
                const qbFlag = qbDiff >= 0.5 ? 'flag-good' : 'flag-warn';
                html += `<div class="format-row">
                    <div><div class="format-label">QB count: SF <span class="format-badge fb-sf">SF</span> vs 1QB</div><div class="format-insight">${qbInsight}</div></div>
                    <div style="text-align:right"><span class="format-val">${sfQBAvg}</span> <span style="color:#475569;font-size:0.75rem;">vs</span> <span class="format-val">${nonSFQBAvg}</span></div>
                </div>`;
            } else if (sfLeagues.length > 0) {
                html += `<div class="format-row"><div class="format-label">QB count in SF <span class="format-badge fb-sf">SF</span></div><div class="format-val">${sfQBAvg} avg QBs</div></div>`;
            }

            // QB % of score in SF vs non-SF
            if (sfQBPct !== null && nonSFQBPct !== null) {
                const pctDiff = sfQBPct - nonSFQBPct;
                const insight = pctDiff >= 5 ? 'Correctly values QBs higher in SF' : pctDiff >= 0 ? 'Slight QB premium in SF' : 'QB value not adjusted for SF';
                const flagCls = pctDiff >= 3 ? 'flag-good' : 'flag-warn';
                html += `<div class="format-row">
                    <div><div class="format-label">QB % of roster value: SF vs 1QB</div><div class="format-insight">${insight}</div></div>
                    <div style="text-align:right"><span class="format-val">${sfQBPct}%</span> <span style="color:#475569;font-size:0.75rem;">vs</span> <span class="format-val">${nonSFQBPct}%</span></div>
                </div>`;
            }

            // TE in TEP vs non-TEP
            if (tepLeagues.length > 0 && nonTEPLeagues.length > 0) {
                const teDiff = tepTEAvg - nonTEPTEAvg;
                const teInsight = teDiff >= 1 ? 'Correctly hoards TEs in TEP leagues' : teDiff >= 0.3 ? 'Slightly TE heavy in TEP' : 'Does not adjust TE count for TEP format';
                html += `<div class="format-row">
                    <div><div class="format-label">TE count: TEP <span class="format-badge fb-tep">TEP</span> vs non-TEP</div><div class="format-insight">${teInsight}</div></div>
                    <div style="text-align:right"><span class="format-val">${tepTEAvg}</span> <span style="color:#475569;font-size:0.75rem;">vs</span> <span class="format-val">${nonTEPTEAvg}</span></div>
                </div>`;
            }

            // TE % of score in TEP vs non-TEP
            if (tepTEPct !== null && nonTEPTEPct !== null) {
                const tePctDiff = tepTEPct - nonTEPTEPct;
                const teInsight2 = tePctDiff >= 5 ? 'Correctly values TEs higher in TEP' : tePctDiff >= 0 ? 'Slight TE premium in TEP' : 'TE value not adjusted for TEP format';
                html += `<div class="format-row">
                    <div><div class="format-label">TE % of roster value: TEP vs non-TEP</div><div class="format-insight">${teInsight2}</div></div>
                    <div style="text-align:right"><span class="format-val">${tepTEPct}%</span> <span style="color:#475569;font-size:0.75rem;">vs</span> <span class="format-val">${nonTEPTEPct}%</span></div>
                </div>`;
            }

            if (sfLeagues.length === 0 && tepLeagues.length === 0) {
                html += `<div style="color:#475569;font-size:0.85rem;">Only one format detected — need both SF and 1QB leagues (or TEP and non-TEP) to compare tendencies.</div>`;
            }

            html += `</div></div>`;

            // NFL Team biases
            html += `<div class="section-block"><div class="section-title">🏟️ NFL Team Biases</div><div class="insight-card">`;
            if (teamBiases.length > 0) {
                teamBiases.forEach(([team, count]) => {
                    html += `<span class="bias-pill">${team} <span style="color:#94a3b8;font-size:0.7rem;">×${count}</span></span>`;
                });
                html += `<div style="font-size:0.72rem;color:#334155;margin-top:0.75rem;">Teams with 3+ players across all rosters</div>`;
            } else {
                html += `<div style="color:#475569;font-size:0.85rem;">No strong team biases detected (no team with 3+ players across all rosters)</div>`;
            }
            html += `</div></div>`;

            // League by league breakdown — moved BEFORE roster profile
            html += `<div class="section-block"><div class="section-title">🏆 Selected Leagues Breakdown</div>
            <div class="insight-card" style="padding:0;overflow:hidden;">
            <table class="league-table"><thead><tr>
                <th>League</th><th>Format</th><th>Score</th><th>Tiers</th><th>QB%</th><th>TE%</th><th>Avg Age</th>
            </tr></thead><tbody>`;

            [...leagueData].sort((a,b) => b.totalScore - a.totalScore).forEach(d => {
                const tot = Object.values(d.posTotals).reduce((s,v) => s+v, 1);
                const qbPct = Math.round((d.posTotals.QB / tot) * 100);
                const tePct = Math.round((d.posTotals.TE / tot) * 100);
                html += `<tr>
                    <td><a href="league.html?id=${d.league.league_id}" style="color:#fbbf24;text-decoration:none;">${d.league.name}</a></td>
                    <td style="color:#64748b;font-size:0.75rem;">${d.scoring.label}</td>
                    <td style="font-weight:600;color:#fbbf24;">${d.totalScore}</td>
                    <td><div class="tier-pills">
                        ${d.t1>0?`<span class="tier-pill tp-t1">T1×${d.t1}</span>`:''}
                        ${d.t2>0?`<span class="tier-pill tp-t2">T2×${d.t2}</span>`:''}
                        ${d.t3>0?`<span class="tier-pill tp-t3">T3×${d.t3}</span>`:''}
                    </div></td>
                    <td style="color:${d.scoring.hasSF?'#60a5fa':'#64748b'}">${qbPct}%</td>
                    <td style="color:${d.scoring.hasTEP?'#a78bfa':'#64748b'}">${tePct}%</td>
                    <td style="color:#64748b;">${d.avgAge.toFixed(1)}</td>
                </tr>`;
            });

            html += `</tbody></table></div></div>`;
            contentDiv.innerHTML = html;
        }

        function tendBar(label, value, color) {
            return `<div class="tendency-row">
                <span class="tend-label">${label}</span>
                <div class="tend-track"><div class="tend-fill" style="width:${value}%;background:${color};"></div></div>
                <span class="tend-val">${value}%</span>
            </div>`;
        }

        // Auto-load on page open, pre-fill from URL param if present
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlUser = urlParams.get('user');
            if (urlUser) usernameInput.value = urlUser;
            loadProfile();
        });
    </script>
</body>
